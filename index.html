<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Шкільний монітор</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-image: url('background.jpg'); background-size: cover; background-position: center; background-attachment: fixed; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 15px; }
        .card { background: rgba(255, 255, 255, 0.98); padding: 30px; border-radius: 20px; box-shadow: 0 10px 40px rgba(75, 22, 129, 0.4); width: 100%; max-width: 550px; position: relative; box-sizing: border-box; }
        .admin-panel { background: #f3ebf9; border: 2px solid #61309e; padding: 20px; border-radius: 15px; margin-bottom: 25px; }
        
        .student-selector { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: white; padding: 12px; border-radius: 10px; border: 1px solid #cbb2eb; margin-bottom: 15px; max-height: 200px; overflow-y: auto; }
        .student-selector label { display: flex; align-items: center; gap: 8px; font-weight: normal; font-size: 14px; color: #4b1681; margin: 0; cursor: pointer; }
        .student-selector input { width: auto; margin: 0; cursor: pointer; }

        .report-box { background: white; border: 1px solid #cbb2eb; padding: 15px; border-radius: 10px; margin-top: 15px; font-size: 14px; max-height: 300px; overflow-y: auto; }
        h1 { color: #1a012b; text-align: center; margin-top: 0; }
        .subtitle { color: #8352b2; text-align: center; margin-bottom: 25px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #4b1681; font-size: 18px; }
        select, input { width: 100%; padding: 12px; border: 2px solid #e9dcf5; border-radius: 12px; font-size: 18px; box-sizing: border-box; margin-bottom: 15px; }
        button { width: 100%; padding: 15px; background-color: #61309e; color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        
        .btn-small { padding: 8px; font-size: 13px; width: 48%; display: inline-block; background: #cbb2eb; color: #4b1681; margin-bottom: 15px; }
        
        .subject-group { background: #fdfaff; border-radius: 15px; padding: 15px; margin-top: 20px; border: 1px solid #e9dcf5; }
        .subject-group h4 { color: #61309e; margin: 0; border-bottom: 2px solid #cbb2eb; }
        .multi-row { display: flex; align-items: center; gap: 10px; background: white; padding: 10px; border-radius: 10px; margin-bottom: 8px; border: 1px solid #f3ebf9; }
        .date-cell { background: #8352b2; color: white; padding: 5px 10px; border-radius: 8px; font-weight: bold; }
        .status-debt { color: #c0392b; font-weight: bold; flex-grow: 1; }
        .hidden { display: none; }
        .editable-cat { color: #4b1681; font-weight: 800; cursor: pointer; text-decoration: underline dotted; }
    </style>
</head>
<body>

<div class="card">
    <h1>Шкільний монітор</h1>
    <p class="subtitle">Керування заборгованістю</p>

    <div id="adminPanel" class="admin-panel hidden">
        <h3 style="color:#61309e; margin:0 0 10px 0;">Панель вчителя 👩‍🏫</h3>
        
        <label style="font-size:14px;">Кому додати борг?</label>
        <div class="student-selector" id="massCheckboxes"></div>
        <div style="display: flex; justify-content: space-between;">
            <button class="btn-small" onclick="toggleAll(true)">Обрати всіх</button>
            <button class="btn-small" onclick="toggleAll(false)">Скинути</button>
        </div>

        <label style="font-size:14px;">Предмет та робота:</label>
        <select id="massSub" style="padding:8px; font-size:14px;">
            <option value="">-- Оберіть предмет --</option>
        </select>
        <input type="text" id="massTask" placeholder="Назва боргу" style="padding:8px; font-size:14px;">
        
        <button id="addBtn" onclick="addSelectedWork()" style="background:#4b1681;">Додати обраним</button>
        <hr style="border:1px solid #cbb2eb; margin:15px 0;">
        <button onclick="generateReport()" style="background:#27ae60; padding:10px; font-size:14px;">📊 Звіт по боргах</button>
        <div id="reportArea" class="report-box hidden"></div>
    </div>

    <div id="loginSection">
        <label>Оберіть учня:</label>
        <select id="studentSelect">
            <option value="">-- Список учнів --</option>
        </select>
        <label>Введіть код:</label>
        <input type="text" id="passCode" placeholder="Наприклад: 00.00" onkeypress="if(event.key==='Enter') checkData()">
        <button onclick="checkData()">Увійти</button>
    </div>

    <div id="result" class="hidden">
        <button onclick="location.reload()" style="background:#e9dcf5; color:#61309e; padding:8px; font-size:14px; margin-bottom:15px; width: auto;">⬅ Вийти</button>
        <h3 id="studentNameDisplay" style="text-align:center; color:#4b1681;"></h3>
        <div id="debtList"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCaf5Zwl4mIxdReLgdoUCkzi1KWEMzeEpA",
        authDomain: "schoolmonitor-b1c8b.firebaseapp.com",
        databaseURL: "https://schoolmonitor-b1c8b-default-rtdb.firebaseio.com/",
        projectId: "schoolmonitor-b1c8b",
        storageBucket: "schoolmonitor-b1c8b.firebasestorage.app",
        messagingSenderId: "838073337449",
        appId: "1:838073337449:web:33a254365be4761b0544f8"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    const students = {
        "id1": { code: "26.12", name: "Астахова Євгенія" }, "id2": { code: "01.04", name: "Бабенко Поліна" },
        "id3": { code: "13.02", name: "Водолазька Соломія" }, "id4": { code: "15.02", name: "Гомонюк Софія" },
        "id5": { code: "01.10", name: "Деміденко Аріна" }, "id6": { code: "11.12", name: "Єлісеєв Дмитро" },
        "id7": { code: "05.07", name: "Іванець Тімур" }, "id8": { code: "12.02", name: "Калантаєва Анастасія" },
        "id9": { code: "31.01", name: "Лисих Ліана" }, "id10": { code: "17.06", name: "Оковитий Максим" },
        "id11": { code: "26.04", name: "Павлов Тимур" }, "id12": { code: "25.04", name: "Радченко Владислава" },
        "id13": { code: "15.01", name: "Скабардіна Мілослава" }, "id14": { code: "27.10", name: "Удовіка Макар" },
        "id15": { code: "24.06", name: "Філатова Ульяна" }, "id16": { code: "04.03", name: "Холматова Віолетта" },
        "id17": { code: "04.05", name: "Шаповал Тимур" }
    };

    const structure = {
        "Літературне читання": ["Діагностична робота", "Вірш", "Творча робота"],
        "Українська мова": ["Діагностична робота", "Свій вид діяльності"],
        "Математика": ["Діагностична робота", "Самостійна робота"],
        "Я досліджую світ": ["Діагностична робота", "Свій вид діяльності"],
        "Дизайн і технології": ["Творча робота"]
    };

    const sel = document.getElementById('studentSelect');
    const chkArea = document.getElementById('massCheckboxes');
    for (let id in students) {
        sel.innerHTML += `<option value="${id}">${students[id].name}</option>`;
        chkArea.innerHTML += `<label><input type="checkbox" value="${id}"> ${students[id].name.split(' ')[0]}</label>`;
    }

    const mSub = document.getElementById('massSub');
    for (let s in structure) {
        structure[s].forEach(c => {
            mSub.innerHTML += `<option value="${s}|${c}">${s} - ${c}</option>`;
        });
    }

    function toggleAll(val) {
        document.querySelectorAll('#massCheckboxes input').forEach(c => c.checked = val);
    }

    function checkData() {
        const id = document.getElementById('studentSelect').value;
        const code = document.getElementById('passCode').value.trim();
        if (code === "21.08") {
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('adminPanel').classList.remove('hidden');
            if (id) { document.getElementById('result').classList.remove('hidden'); loadData(id, true); }
            else { document.getElementById('studentNameDisplay').innerText = "Панель вчителя"; }
        } else if (id && students[id] && students[id].code === code) {
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('result').classList.remove('hidden');
            loadData(id, false);
        } else { alert("Невірний код!"); }
    }

    function addSelectedWork() {
        const selected = Array.from(document.querySelectorAll('#massCheckboxes input:checked')).map(c => c.value);
        const subVal = document.getElementById('massSub').value;
        const task = document.getElementById('massTask').value.trim();
        
        if (!subVal || !task || selected.length === 0) { 
            alert("Оберіть учнів, предмет та впишіть назву роботи!"); 
            return; 
        }
        
        const val = subVal.split('|');
        
        if (confirm(`Додати борг "${task}" для ${selected.length} учнів?`)) {
            const date = new Date().toLocaleDateString('uk-UA').slice(0, 5);
            selected.forEach(sid => {
                const key = database.ref().child('students').push().key;
                database.ref(`students/${sid}/${val[0]}/${val[1]}/${key}`).set({date: date, val: task});
            });
            
            // ОЧИЩЕННЯ ПІСЛЯ ЗБЕРЕЖЕННЯ
            alert("Готово! Дані оновлено.");
            toggleAll(false); // Скинути всі галочки
            document.getElementById('massTask').value = ""; // Очистити назву роботи
            document.getElementById('massSub').value = ""; // Повернути вибір предмета на початок
        }
    }

    async function generateReport() {
        const area = document.getElementById('reportArea');
        area.classList.remove('hidden'); area.innerHTML = "⏳ Оновлення...";
        const snap = await database.ref('students').once('value');
        const allData = snap.val() || {};
        let html = "<strong>Звіт:</strong><br>";
        for (let sub in structure) {
            structure[sub].forEach(cat => {
                let debts = {};
                for (let sid in students) {
                    const d = (allData[sid] && allData[sid][sub] && allData[sid][sub][cat]) ? allData[sid][sub][cat] : {};
                    for (let k in d) if (d[k].val) {
                        if (!debts[d[k].val]) debts[d[k].val] = [];
                        debts[d[k].val].push(students[sid].name.split(' ')[0]);
                    }
                }
                for (let t in debts) html += `● ${sub} (${t}): <span style="color:red">${debts[t].join(', ')}</span><br>`;
            });
        }
        area.innerHTML = html || "✅ Боргів немає";
    }

    function loadData(id, canEdit) {
        document.getElementById('studentNameDisplay').innerText = students[id].name;
        database.ref('students/' + id).on('value', snap => {
            const data = snap.val() || {};
            const list = document.getElementById('debtList');
            list.innerHTML = "";
            for (let sub in structure) {
                let div = document.createElement('div');
                div.className = 'subject-group';
                div.innerHTML = `<h4>${sub}</h4>`;
                structure[sub].forEach(cat => {
                    const name = (data.config && data.config[sub] && data.config[sub][cat]) ? data.config[sub][cat] : cat;
                    let p = document.createElement('p');
                    p.innerHTML = `<span class="${canEdit ? 'editable-cat' : ''}">${name}</span>`;
                    if (canEdit) p.onclick = () => { let n = prompt("Змінити назву:", name); if(n) database.ref(`students/${id}/config/${sub}/${cat}`).set(n); };
                    div.appendChild(p);
                    const items = (data[sub] && data[sub][cat]) ? data[sub][cat] : {};
                    for (let k in items) {
                        if (!canEdit && !items[k].val) continue;
                        let row = document.createElement('div');
                        row.className = 'multi-row';
                        row.innerHTML = `<span class="date-cell">${items[k].date}</span><span class="${items[k].val ? 'status-debt':'status-ok'}">${items[k].val || 'немає ✅'}</span>`;
                        if(canEdit) {
                            let b = document.createElement('button'); b.innerText = "×"; b.style.width="30px"; b.style.background="none"; b.style.color="red"; b.style.border="none"; b.style.fontSize="20px";
                            b.onclick = () => database.ref(`students/${id}/${sub}/${cat}/${k}`).remove();
                            row.appendChild(b);
                        }
                        div.appendChild(row);
                    }
                    if (canEdit) {
                        let add = document.createElement('button'); add.innerText = "+"; add.style.padding="2px"; add.style.width="40px";
                        add.onclick = () => { const k = database.ref().child('students').push().key; database.ref(`students/${id}/${sub}/${cat}/${k}`).set({date: new Date().toLocaleDateString('uk-UA').slice(0,5), val: ""}); };
                        div.appendChild(add);
                    }
                });
                list.appendChild(div);
            }
        });
    }
</script>
</body>
</html>
