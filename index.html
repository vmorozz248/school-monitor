<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Шкільний монітор</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f0f9; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 10px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); width: 100%; max-width: 500px; box-sizing: border-box; }
        .admin-panel { background: #f9f5ff; border: 2px solid #61309e; padding: 15px; border-radius: 12px; margin-bottom: 20px; }
        
        /* СУВОРА СІТКА ДЛЯ СПИСКУ */
        .student-selector { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; 
            background: white; padding: 10px; border: 1px solid #ddd; 
            border-radius: 8px; max-height: 180px; overflow-y: auto; margin-bottom: 10px;
        }
        .student-selector label { display: flex; align-items: center; gap: 8px; font-size: 14px; cursor: pointer; }
        .student-selector input { width: 18px; height: 18px; margin: 0; }

        .quick-access { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 10px; }
        .quick-btn { background: #eee; border: 1px solid #ccc; padding: 5px 8px; border-radius: 10px; font-size: 11px; cursor: pointer; }
        .quick-btn.active { background: #61309e; color: white; }

        h1 { color: #1a012b; text-align: center; font-size: 24px; margin: 0; }
        label { display: block; margin: 10px 0 5px; font-weight: bold; font-size: 14px; }
        select, input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; margin-bottom: 10px; }
        button { width: 100%; padding: 12px; background: #61309e; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        
        .history-box { font-size: 11px; margin-top: 10px; border-top: 1px solid #eee; padding-top: 5px; }
        .subject-group { border: 1px solid #eee; padding: 10px; margin-top: 10px; border-radius: 8px; }
        .multi-row { display: flex; align-items: center; gap: 10px; margin-bottom: 5px; font-size: 14px; }
        .date-cell { background: #8352b2; color: white; padding: 2px 6px; border-radius: 4px; font-size: 12px; }
        .status-debt { color: red; font-weight: bold; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="card">
    <h1>Шкільний монітор</h1>
    <div id="adminPanel" class="admin-panel hidden">
        <div class="student-selector" id="massCheckboxes"></div>
        <div style="display:flex; gap:10px; margin-bottom:10px;">
            <button style="padding:5px; font-size:12px;" onclick="toggleAll(true)">Обрати всіх</button>
            <button style="padding:5px; font-size:12px;" onclick="toggleAll(false)">Скинути</button>
        </div>
        <div class="quick-access">
            <div class="quick-btn" onclick="setQuick('Математика|Самостійна робота')">Мат (СР)</div>
            <div class="quick-btn" onclick="setQuick('Українська мова|Діагностична робота')">Укр (ДР)</div>
            <div class="quick-btn" onclick="setQuick('Літературне читання|Вірш')">Вірш</div>
        </div>
        <select id="massSub"><option value="">-- Предмет --</option></select>
        <input type="text" id="massTask" placeholder="Назва роботи">
        <button onclick="addSelectedWork()">Додати обраним</button>
        <div id="historyList" class="history-box"></div>
    </div>

    <div id="loginSection">
        <select id="studentSelect"><option value="">-- Учень --</option></select>
        <input type="text" id="passCode" placeholder="Код" onkeypress="if(event.key==='Enter') checkData()">
        <button onclick="checkData()">Увійти</button>
    </div>

    <div id="result" class="hidden">
        <button onclick="location.reload()" style="width:auto; padding:5px 10px; margin-bottom:10px;">⬅ Вийти</button>
        <h3 id="studentNameDisplay"></h3>
        <div id="debtList"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCaf5Zwl4mIxdReLgdoUCkzi1KWEMzeEpA",
        authDomain: "schoolmonitor-b1c8b.firebaseapp.com",
        databaseURL: "https://schoolmonitor-b1c8b-default-rtdb.firebaseio.com/",
        projectId: "schoolmonitor-b1c8b",
        storageBucket: "schoolmonitor-b1c8b.firebasestorage.app",
        messagingSenderId: "838073337449",
        appId: "1:838073337449:web:33a254365be4761b0544f8"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    const students = {
        "id1": { code: "26.12", name: "Астахова Євгенія" }, "id2": { code: "01.04", name: "Бабенко Поліна" },
        "id3": { code: "13.02", name: "Водолазька Соломія" }, "id4": { code: "15.02", name: "Гомонюк Софія" },
        "id5": { code: "01.10", name: "Деміденко Аріна" }, "id6": { code: "11.12", name: "Єлісеєв Дмитро" },
        "id7": { code: "05.07", name: "Іванець Тімур" }, "id8": { code: "12.02", name: "Калантаєва Анастасія" },
        "id9": { code: "31.01", name: "Лисих Ліана" }, "id10": { code: "17.06", name: "Оковитий Максим" },
        "id11": { code: "26.04", name: "Павлов Тимур" }, "id12": { code: "25.04", name: "Радченко Владислава" },
        "id13": { code: "15.01", name: "Скабардіна Мілослава" }, "id14": { code: "27.10", name: "Удовіка Макар" },
        "id15": { code: "24.06", name: "Філатова Ульяна" }, "id16": { code: "04.03", name: "Холматова Віолетта" },
        "id17": { code: "04.05", name: "Шаповал Тимур" }
    };
    const structure = {
        "Літературне читання": ["Діагностична робота", "Вірш", "Творча робота"],
        "Українська мова": ["Діагностична робота", "Свій вид діяльності"],
        "Математика": ["Діагностична робота", "Самостійна робота"],
        "Я досліджую світ": ["Діагностична робота", "Свій вид діяльності"],
        "Дизайн і технології": ["Творча робота"]
    };

    const sel = document.getElementById('studentSelect');
    const chkArea = document.getElementById('massCheckboxes');
    for (let id in students) {
        sel.innerHTML += `<option value="${id}">${students[id].name}</option>`;
        chkArea.innerHTML += `<label><input type="checkbox" value="${id}"> ${students[id].name.split(' ')[0]}</label>`;
    }
    const mSub = document.getElementById('massSub');
    for (let s in structure) structure[s].forEach(c => mSub.innerHTML += `<option value="${s}|${c}">${s} - ${c}</option>`);

    function setQuick(v) { document.getElementById('massSub').value = v; }
    function toggleAll(v) { document.querySelectorAll('#massCheckboxes input').forEach(c => c.checked = v); }

    function checkData() {
        const id = document.getElementById('studentSelect').value;
        const code = document.getElementById('passCode').value.trim();
        if (code === "21.08") {
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('adminPanel').classList.remove('hidden');
            if (id) { document.getElementById('result').classList.remove('hidden'); loadData(id, true); }
        } else if (id && students[id].code === code) {
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('result').classList.remove('hidden');
            loadData(id, false);
        } else alert("Помилка!");
    }

    function addSelectedWork() {
        const selected = Array.from(document.querySelectorAll('#massCheckboxes input:checked')).map(c => c.value);
        const sub = document.getElementById('massSub').value.split('|');
        const task = document.getElementById('massTask').value.trim();
        if (!task || selected.length === 0) return;
        const date = new Date().toLocaleDateString('uk-UA').slice(0, 5);
        selected.forEach(sid => {
            const k = database.ref().child('students').push().key;
            database.ref(`students/${sid}/${sub[0]}/${sub[1]}/${k}`).set({date: date, val: task});
        });
        alert("Додано!");
        toggleAll(false); document.getElementById('massTask').value = "";
    }

    function loadData(id, edit) {
        document.getElementById('studentNameDisplay').innerText = students[id].name;
        database.ref('students/' + id).on('value', snap => {
            const data = snap.val() || {};
            const list = document.getElementById('debtList'); list.innerHTML = "";
            for (let sub in structure) {
                let div = document.createElement('div'); div.className = 'subject-group';
                div.innerHTML = `<h4>${sub}</h4>`;
                structure[sub].forEach(cat => {
                    const items = (data[sub] && data[sub][cat]) ? data[sub][cat] : {};
                    for (let k in items) {
                        if (!edit && !items[k].val) continue;
                        let row = document.createElement('div'); row.className = 'multi-row';
                        row.innerHTML = `<span class="date-cell">${items[k].date}</span><span class="${items[k].val?'status-debt':''}">${items[k].val || 'немає ✅'}</span>`;
                        if(edit) {
                            let b = document.createElement('button'); b.innerText = "×"; b.style.width="30px"; b.onclick = () => database.ref(`students/${id}/${sub}/${cat}/${k}`).remove();
                            row.appendChild(b);
                        }
                        div.appendChild(row);
                    }
                });
                list.appendChild(div);
            }
        });
    }
</script>
</body>
</html>
