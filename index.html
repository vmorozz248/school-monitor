<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Шкільний монітор 4-А</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f0f9 url('https://raw.githubusercontent.com/vmorozz248/school-monitor/main/background.png') no-repeat center center fixed; background-size: cover; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 10px; }
        .card { background: rgba(255, 255, 255, 0.98); padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); width: 100%; max-width: 450px; position: relative; }
        .tab-menu { display: flex; gap: 5px; margin-bottom: 20px; border-bottom: 2px solid #e9dcf5; justify-content: space-around; }
        .tab { padding: 10px 5px; cursor: pointer; font-weight: bold; color: #8352b2; font-size: 14px; flex: 1; text-align: center; }
        .tab.active { color: #61309e; border-bottom: 3px solid #61309e; }
        .student-list-container { background: white; border: 1px solid #e9dcf5; border-radius: 15px; padding: 10px; max-height: 250px; overflow-y: auto; margin-bottom: 15px; }
        .student-row { display: flex; align-items: center; padding: 10px; border-bottom: 1px solid #f9f4fd; cursor: pointer; width: 100%; }
        .student-row input[type="checkbox"] { width: 20px; height: 20px; margin-right: 15px; accent-color: #61309e; flex-shrink: 0; }
        .student-row span { color: #4b1681; font-size: 15px; }
        select, input { width: 100%; padding: 12px; border: 2px solid #e9dcf5; border-radius: 12px; font-size: 15px; margin-bottom: 12px; outline: none; background: white; }
        button { width: 100%; padding: 14px; background: #61309e; color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; }
        button:active { transform: scale(0.98); }
        .group-header { background: #fff; border: 1px solid #e9dcf5; padding: 12px; border-radius: 15px; margin-bottom: 8px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; color: #61309e; font-weight: bold; }
        .group-content { display: none; padding: 5px 10px; }
        .group-content.open { display: block; }
        .journal-card { background: #fdfaff; border: 1px solid #eee; padding: 10px; border-radius: 10px; margin-bottom: 8px; font-size: 14px; text-align: left; }
        .date-badge { display: inline-block; background: #f0e6f7; color: #61309e; padding: 2px 7px; border-radius: 8px; font-size: 11px; font-weight: bold; margin-bottom: 4px; }
        .cat-tag { font-size: 10px; font-weight: bold; text-transform: uppercase; padding: 2px 6px; border-radius: 5px; color: white; display: inline-block; margin-left: 5px; }
        .c-diag { background: #e74c3c; } .c-creat { background: #27ae60; } .c-poem { background: #2980b9; } .c-other { background: #8e44ad; }
        .debtor-tag { display: inline-block; background: #e9dcf5; color: #61309e; padding: 3px 8px; border-radius: 8px; margin: 2px; font-size: 11px; font-weight: bold; cursor: pointer; }
        .hidden { display: none !important; }
        .teacher-avatar { position: fixed; bottom: -10px; right: -30px; width: 300px; z-index: 100; pointer-events: none; opacity: 0.9; }
    </style>
</head>
<body>

<img src="https://i.ibb.co/6fH9vjx/1.png" class="teacher-avatar">

<div class="card">
    <h2 style="color: #1a012b; text-align: center; margin: 0 0 20px 0;">Шкільний монітор</h2>

    <div id="adminPanel" class="hidden">
        <div class="tab-menu">
            <div class="tab active" onclick="showTab(1)">➕ Додати</div>
            <div class="tab" onclick="showTab(2)">📓 Журнал</div>
            <div class="tab" onclick="showTab(3)">📊 План</div>
        </div>
        
        <div id="view1">
            <div class="student-list-container" id="chkArea"></div>
            <select id="subSel"><option value="">-- Предмет --</option></select>
            <input type="date" id="dateInp">
            <input type="text" id="taskInp" placeholder="Назва роботи">
            <button onclick="sendDebt()">Розіслати борг</button>
        </div>

        <div id="view2" class="hidden"><div id="journalArea"></div></div>

        <div id="view3" class="hidden">
            <div id="planList" style="max-height: 400px; overflow-y: auto;"></div>
            <button onclick="saveAllPlans()">Зберегти плани</button>
            <button style="background: #e74c3c; margin-top: 15px;" onclick="resetAllDebts()">❌ Очистити базу боргів</button>
        </div>
    </div>

    <div id="loginForm">
        <select id="uSel" style="margin-bottom: 15px;"><option value="">-- Учень --</option></select>
        <input type="text" id="pInp" placeholder="Код" onkeypress="if(event.key==='Enter') login()">
        <button onclick="login()">Увійти</button>
    </div>

    <div id="resultView" class="hidden">
        <button onclick="location.reload()" style="width:auto; padding:5px 15px; margin-bottom:15px;">⬅ Назад</button>
        <h3 id="sNameTitle" style="text-align:center; color:#61309e; margin: 10px 0;"></h3>
        <div id="debtListArea"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCaf5Zwl4mIxdReLgdoUCkzi1KWEMzeEpA",
        authDomain: "schoolmonitor-b1c8b.firebaseapp.com",
        databaseURL: "https://schoolmonitor-b1c8b-default-rtdb.firebaseio.com/",
        projectId: "schoolmonitor-b1c8b",
        storageBucket: "schoolmonitor-b1c8b.firebasestorage.app",
        messagingSenderId: "838073337449",
        appId: "1:838073337449:web:33a254365be4761b0544f8"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const students = {
        "id1": { name: "Астахова Є.", code: "26.12" }, "id2": { name: "Бабенко П.", code: "01.04" },
        "id3": { name: "Водолазька С.", code: "13.02" }, "id4": { name: "Гомонюк С.", code: "15.02" },
        "id5": { name: "Деміденко А.", code: "01.10" }, "id6": { name: "Єлісеєв Д.", code: "11.12" },
        "id7": { name: "Іванець Т.", code: "05.07" }, "id8": { name: "Калантаєва А.", code: "12.02" },
        "id9": { name: "Лисих Л.", code: "31.01" }, "id10": { name: "Оковитий М.", code: "17.06" },
        "id11": { name: "Павлов Т.", code: "26.04" }, "id12": { name: "Радченко В.", code: "25.04" },
        "id13": { name: "Скабардіна М.", code: "15.01" }, "id14": { name: "Удовіка М.", code: "27.10" },
        "id15": { name: "Філатова У.", code: "24.06" }, "id16": { name: "Холматова В.", code: "04.03" },
        "id17": { name: "Шаповал Т.", code: "04.05" }
    };

    const structure = {
        "Літературне читання": ["Діагностична робота", "Вірш", "Творча робота"],
        "Українська мова": ["Діагностична робота", "Інше"],
        "Математика": ["Діагностична робота", "Самостійна робота"],
        "Я досліджую світ": ["Діагностична робота", "Інше"],
        "Дизайн і технології": ["Творча робота"]
    };

    let openGroups = new Set();
    document.getElementById('dateInp').valueAsDate = new Date();

    const sortedIds = Object.keys(students).sort((a,b)=>students[a].name.localeCompare(students[b].name));
    sortedIds.forEach(id => {
        document.getElementById('chkArea').innerHTML += `<div class="student-row" onclick="this.querySelector('input').click()"><input type="checkbox" value="${id}" onclick="event.stopPropagation()"><span>${students[id].name}</span></div>`;
        document.getElementById('uSel').innerHTML += `<option value="${id}">${students[id].name}</option>`;
    });

    for(let s in structure) {
        document.getElementById('planList').innerHTML += `<div style="background:#f4f0f9; padding:5px 10px; font-weight:bold; color:#61309e; margin-top:10px; border-radius:5px;">${s}</div>`;
        structure[s].forEach(c => { 
            document.getElementById('subSel').innerHTML += `<option value="${s}|${c}">${s} - ${c}</option>`; 
            document.getElementById('planList').innerHTML += `<div style="display:flex; justify-content:space-between; align-items:center; padding:8px 10px; background:white; border-radius:10px; margin-bottom:4px; border:1px solid #e9dcf5; font-size:13px;"><span>${c}</span><input type="number" id="plan_${s}_${c}" style="width:60px; margin:0; text-align:center; padding:5px;"></div>`;
        });
    }

    function showTab(n) {
        document.getElementById('view1').classList.toggle('hidden', n !== 1);
        document.getElementById('view2').classList.toggle('hidden', n !== 2);
        document.getElementById('view3').classList.toggle('hidden', n !== 3);
        document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i+1 === n));
        if(n===2) loadJournal();
        if(n===3) loadAllPlans();
    }

    function saveAllPlans() {
        let plans = {};
        for(let s in structure) {
            plans[s] = {};
            structure[s].forEach(c => { plans[s][c] = document.getElementById(`plan_${s}_${c}`).value || 0; });
        }
        db.ref('plans_v2').set(plans).then(() => alert("Плани робіт оновлено!"));
    }

    function loadAllPlans() {
        db.ref('plans_v2').once('value', snap => {
            const data = snap.val() || {};
            for(let s in structure) {
                if(data[s]) structure[s].forEach(c => { document.getElementById(`plan_${s}_${c}`).value = data[s][c] || 0; });
            }
        });
    }

    function resetAllDebts() { if(confirm("Очистити всю базу боргів?")) db.ref('students').remove().then(() => alert("Очищено!")); }

    function sendDebt() {
        const sel = Array.from(document.querySelectorAll('#chkArea input:checked')).map(c => c.value);
        const subInfo = document.getElementById('subSel').value.split('|');
        const task = document.getElementById('taskInp').value.trim();
        const dateRaw = document.getElementById('dateInp').value;
        if (!task || sel.length === 0 || !subInfo[0]) return alert("Заповніть усе!");
        const d = new Date(dateRaw), fDate = d.getDate().toString().padStart(2, '0') + '.' + (d.getMonth() + 1).toString().padStart(2, '0');
        sel.forEach(sid => { db.ref(`students/${sid}/${subInfo[0]}/${subInfo[1]}`).push({ date: fDate, val: task }); });
        alert("Розіслано!"); document.getElementById('taskInp').value = "";
        document.querySelectorAll('#chkArea input').forEach(c => c.checked = false);
    }

    function loadJournal() {
        const area = document.getElementById('journalArea'); area.innerHTML = "Завантаження...";
        db.ref('students').once('value', snap => {
            const data = snap.val() || {}; area.innerHTML = "";
            let subs = {};
            for(let sid in data) {
                for(let sub in data[sid]) {
                    if(sub.includes('_') || sub === "undefined") continue;
                    if(!subs[sub]) subs[sub] = {};
                    for(let cat in data[sid][sub]) {
                        for(let tid in data[sid][sub][cat]) {
                            const t = data[sid][sub][cat][tid];
                            const key = `${cat}|${t.val}|${t.date}`;
                            if(!subs[sub][key]) subs[sub][key] = {cat, task: t.val, date: t.date, list: []};
                            subs[sub][key].list.push({sid, tid});
                        }
                    }
                }
            }
            for(let n in subs) {
                const isOpen = openGroups.has(n);
                let h = `<div class="group-header" onclick="toggleGr(this, '${n}')"><span>📚 ${n}</span><span>${isOpen?'▲':'▼'}</span></div>`;
                let c = `<div class="group-content ${isOpen?'open':''}">`;
                Object.values(subs[n]).forEach(item => {
                    const cls = item.cat.includes('Діагностична')?'c-diag':item.cat.includes('Творча')?'c-creat':item.cat.includes('Вірш')?'c-poem':'c-other';
                    c += `<div class="journal-card"><span class="date-badge">${item.date}</span><span class="cat-tag ${cls}">${item.cat}</span><br><b>${item.task}</b><br>
                    ${item.list.map(l=>`<span class="debtor-tag" onclick="del('${l.sid}','${n}','${item.cat}','${l.tid}')">${students[l.sid].name.split(' ')[0]}</span>`).join('')}</div>`;
                });
                area.innerHTML += h + c + `</div>`;
            }
        });
    }

    function toggleGr(h, id) {
        const c = h.nextElementSibling; const isOp = c.classList.toggle('open');
        if(isOp) openGroups.add(id); else openGroups.delete(id);
        h.querySelector('span:last-child').innerText = isOp ? '▲' : '▼';
    }

    function del(sid, sub, cat, tid) { if(confirm("Видалити борг?")) db.ref(`students/${sid}/${sub}/${cat}/${tid}`).remove().then(loadJournal); }

    function login() {
        const id = document.getElementById('uSel').value, code = document.getElementById('pInp').value;
        if(code === "21.08") {
            if(id) { document.getElementById('loginForm').classList.add('hidden'); document.getElementById('resultView').classList.remove('hidden'); loadData(id); }
            else { document.getElementById('loginForm').classList.add('hidden'); document.getElementById('adminPanel').classList.remove('hidden'); }
        } else if(id && students[id].code === code) {
            document.getElementById('loginForm').classList.add('hidden'); document.getElementById('resultView').classList.remove('hidden'); loadData(id);
        } else alert("Помилка!");
    }

    function loadData(id) {
        document.getElementById('sNameTitle').innerText = students[id].name;
        db.ref('plans_v2').once('value', pSnap => {
            const plans = pSnap.val() || {};
            db.ref('students/'+id).on('value', snap => {
                const data = snap.val() || {}, area = document.getElementById('debtListArea'); area.innerHTML = "";
                for(let sub in structure) {
                    let div = `<div style="background:#fdfaff; border:1px solid #e9dcf5; padding:12px; border-radius:15px; margin-top:15px; text-align:left;"><h4 style="color:#61309e; margin:0 0 10px 0;">${sub}</h4>`;
                    let hasWork = false;
                    structure[sub].forEach(cat => {
                        const planVal = (plans[sub] && plans[sub][cat]) ? parseInt(plans[sub][cat]) : 0;
                        if(planVal > 0) {
                            hasWork = true;
                            let debts = []; if(data[sub] && data[sub][cat]) for(let k in data[sub][cat]) debts.push(data[sub][cat][k]);
                            const done = Math.max(0, planVal - debts.length);
                            const cls = cat.includes('Діагностична')?'c-diag':cat.includes('Творча')?'c-creat':cat.includes('Вірш')?'c-poem':'c-other';
                            div += `<div style="margin-bottom:15px;"><div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:5px;">
                                <span class="cat-tag ${cls}" style="margin:0;">${cat}</span>
                                <span style="font-size:11px; font-weight:bold; color:#61309e;">Виконано: ${done} з ${planVal}</span>
                            </div>`;
                            debts.forEach(d => {
                                div += `<div style="display:flex; align-items:center; gap:8px; background:white; padding:8px; border-radius:10px; border:1px solid #f3ebf9; margin-bottom:4px; font-size:13px;">
                                <span style="background:#61309e; color:white; padding:2px 5px; border-radius:5px; font-size:10px;">${d.date}</span><b>${d.val}</b></div>`;
                            });
                            div += `</div>`;
                        }
                    });
                    if(hasWork) area.innerHTML += div + `</div>`;
                }
            });
        });
    }
</script>
</body>
</html>
