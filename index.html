<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Шкільний монітор</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5 url('https://raw.githubusercontent.com/vmorozz248/school-monitor/main/background.jpg') no-repeat center center fixed; background-size: cover; margin: 0; padding: 10px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: rgba(255, 255, 255, 0.98); padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); width: 100%; max-width: 520px; box-sizing: border-box; }
        .admin-panel { background: #fdfaff; border: 2px solid #61309e; padding: 15px; border-radius: 15px; margin-bottom: 20px; }
        
        .student-table { width: 100%; background: white; border: 1px solid #ddd; border-radius: 10px; padding: 10px; margin-bottom: 10px; max-height: 180px; overflow-y: auto; }
        .grid-list { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .grid-list label { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #4b1681; cursor: pointer; }
        
        .tab-menu { display: flex; gap: 10px; margin-bottom: 15px; border-bottom: 2px solid #e9dcf5; }
        .tab { padding: 10px; cursor: pointer; font-weight: bold; color: #8352b2; font-size: 14px; }
        .tab.active { color: #61309e; border-bottom: 3px solid #61309e; }
        
        .journal-item { background: white; border: 1px solid #e9dcf5; padding: 10px; border-radius: 10px; margin-bottom: 10px; font-size: 13px; }
        .journal-header { display: flex; justify-content: space-between; font-weight: bold; color: #61309e; border-bottom: 1px solid #f3ebf9; padding-bottom: 5px; }
        .debtor-tag { display: inline-block; background: #f3ebf9; color: #61309e; padding: 2px 8px; border-radius: 10px; margin: 2px; cursor: pointer; font-size: 11px; }

        h1 { color: #1a012b; text-align: center; font-size: 24px; margin-bottom: 10px; }
        select, input { width: 100%; padding: 12px; border: 2px solid #e9dcf5; border-radius: 10px; margin-bottom: 10px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; background: #61309e; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
        
        .subject-group { background: #fdfaff; border: 1px solid #e9dcf5; padding: 12px; border-radius: 15px; margin-top: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .subject-group h4 { color: #61309e; margin: 0 0 10px 0; border-bottom: 2px solid #e9dcf5; padding-bottom: 5px; }
        .debt-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; font-size: 14px; background: white; padding: 8px; border-radius: 8px; border: 1px solid #f3ebf9; }
        .date-badge { background: #8352b2; color: white; padding: 2px 8px; border-radius: 5px; font-size: 12px; font-weight: bold; }
        .hidden { display: none; }
    </style>
</head>
<body>
<div class="card">
    <h1>Шкільний монітор</h1>

    <div id="adminPanel" class="admin-panel hidden">
        <div class="tab-menu">
            <div id="tab1" class="tab active" onclick="showTab(1)">➕ Додати</div>
            <div id="tab2" class="tab" onclick="showTab(2)">📓 Журнал</div>
        </div>

        <div id="view1">
            <div class="student-table">
                <div class="grid-list" id="massGrid"></div>
            </div>
            <div style="display:flex; gap:10px; margin-bottom:10px;">
                <button style="padding:5px; font-size:12px; background:#cbb2eb; color:#4b1681;" onclick="selectAll(true)">Усі</button>
                <button style="padding:5px; font-size:12px; background:#cbb2eb; color:#4b1681;" onclick="selectAll(false)">Скинути</button>
            </div>
            <select id="subSel"><option value="">-- Оберіть предмет --</option></select>
            <input type="text" id="taskInp" placeholder="Назва роботи">
            <button onclick="sendDebt()">Розіслати</button>
        </div>

        <div id="view2" class="hidden">
            <div id="journalArea">Завантаження...</div>
        </div>
    </div>

    <div id="loginForm">
        <select id="uSel"><option value="">-- Учень --</option></select>
        <input type="text" id="pInp" placeholder="Введіть код" onkeypress="if(event.key==='Enter') login()">
        <button onclick="login()">Увійти</button>
    </div>

    <div id="resultView" class="hidden">
        <button onclick="location.reload()" style="width:auto; padding:5px 15px; margin-bottom:15px;">⬅ Назад</button>
        <h3 id="sNameDisplay" style="text-align:center; color:#4b1681; margin:0 0 15px 0;"></h3>
        <div id="debtListArea"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCaf5Zwl4mIxdReLgdoUCkzi1KWEMzeEpA",
        authDomain: "schoolmonitor-b1c8b.firebaseapp.com",
        databaseURL: "https://schoolmonitor-b1c8b-default-rtdb.firebaseio.com/",
        projectId: "schoolmonitor-b1c8b",
        storageBucket: "schoolmonitor-b1c8b.firebasestorage.app",
        messagingSenderId: "838073337449",
        appId: "1:838073337449:web:33a254365be4761b0544f8"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const students = {
        "id1": { name: "Астахова Є.", code: "26.12" }, "id2": { name: "Бабенко П.", code: "01.04" },
        "id3": { name: "Водолазька С.", code: "13.02" }, "id4": { name: "Гомонюк С.", code: "15.02" },
        "id5": { name: "Деміденко А.", code: "01.10" }, "id6": { name: "Єлісеєв Д.", code: "11.12" },
        "id7": { name: "Іванець Т.", code: "05.07" }, "id8": { name: "Калантаєва А.", code: "12.02" },
        "id9": { name: "Лисих Л.", code: "31.01" }, "id10": { name: "Оковитий М.", code: "17.06" },
        "id11": { name: "Павлов Т.", code: "26.04" }, "id12": { name: "Радченко В.", code: "25.04" },
        "id13": { name: "Скабардіна М.", code: "15.01" }, "id14": { name: "Удовіка М.", code: "27.10" },
        "id15": { name: "Філатова У.", code: "24.06" }, "id16": { name: "Холматова В.", code: "04.03" },
        "id17": { name: "Шаповал Т.", code: "04.05" }
    };

    const structure = {
        "Літературне читання": ["Діагностична робота", "Вірш", "Творча робота"],
        "Українська мова": ["Діагностична робота", "Інше"],
        "Математика": ["Діагностична робота", "Самостійна робота"],
        "Я досліджую світ": ["Діагностична робота", "Інше"],
        "Дизайн і технології": ["Творча робота"]
    };

    const uSel = document.getElementById('uSel');
    const massGrid = document.getElementById('massGrid');
    Object.keys(students).forEach(id => {
        uSel.innerHTML += `<option value="${id}">${students[id].name}</option>`;
        massGrid.innerHTML += `<label><input type="checkbox" value="${id}"> ${students[id].name.split(' ')[0]}</label>`;
    });

    const subSel = document.getElementById('subSel');
    for (let s in structure) structure[s].forEach(c => subSel.innerHTML += `<option value="${s}|${c}">${s} - ${c}</option>`);

    function showTab(n) {
        document.getElementById('view1').classList.toggle('hidden', n !== 1);
        document.getElementById('view2').classList.toggle('hidden', n !== 2);
        document.getElementById('tab1').classList.toggle('active', n === 1);
        document.getElementById('tab2').classList.toggle('active', n === 2);
        if (n === 2) loadJournal();
    }

    function selectAll(v) { document.querySelectorAll('#massGrid input').forEach(c => c.checked = v); }

    function login() {
        const id = document.getElementById('uSel').value;
        const code = document.getElementById('pInp').value.trim();
        if (code === "21.08") {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('adminPanel').classList.remove('hidden');
            if (id) { document.getElementById('resultView').classList.remove('hidden'); loadData(id, true); }
        } else if (id && students[id].code === code) {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('resultView').classList.remove('hidden');
            loadData(id, false);
        } else alert("Помилка!");
    }

    function sendDebt() {
        const selected = Array.from(document.querySelectorAll('#massGrid input:checked')).map(c => c.value);
        const subData = document.getElementById('subSel').value.split('|');
        const task = document.getElementById('taskInp').value.trim();
        if (!task || selected.length === 0 || !subData[0]) return alert("Заповніть усе!");
        const date = new Date().toLocaleDateString('uk-UA').slice(0, 5);
        const jKey = db.ref('journal').push().key;
        let up = {};
        selected.forEach(sid => {
            const tKey = db.ref().child('students').push().key;
            up[`students/${sid}/${subData[0]}/${subData[1]}/${tKey}`] = {date: date, val: task, jKey: jKey};
        });
        up[`journal/${jKey}`] = {date: date, task: task, sub: subData[0], cat: subData[1], students: selected};
        db.ref().update(up).then(() => { alert("Готово!"); selectAll(false); document.getElementById('taskInp').value = ""; });
    }

    function loadJournal() {
        db.ref('journal').on('value', snap => {
            const area = document.getElementById('journalArea'); area.innerHTML = "";
            const data = snap.val(); if (!data) return area.innerText = "Порожньо";
            Object.keys(data).reverse().forEach(jk => {
                const item = data[jk];
                let h = `<div class="journal-item"><div class="journal-header"><span>${item.sub}: ${item.task}</span><span style="color:red;cursor:pointer" onclick="delFull('${jk}')">🗑</span></div>`;
                if (item.students) item.students.forEach(sid => h += `<span class="debtor-tag" onclick="remOne('${jk}','${sid}')">${students[sid].name.split(' ')[0]} ×</span>`);
                area.innerHTML += h + `</div>`;
            });
        });
    }

    function remOne(jk, sid) {
        if (!confirm("Учень здав борг?")) return;
        db.ref(`journal/${jk}`).once('value', s => {
            const j = s.val();
            const newList = j.students.filter(id => id !== sid);
            db.ref(`journal/${jk}/students`).set(newList);
            db.ref(`students/${sid}/${j.sub}/${j.cat}`).once('value', st => {
                const ts = st.val();
                for (let k in ts) if (ts[k].jKey === jk) db.ref(`students/${sid}/${j.sub}/${j.cat}/${k}`).remove();
            });
        });
    }

    function delFull(jk) {
        if (!confirm("Видалити всю розсилку?")) return;
        db.ref(`journal/${jk}`).once('value', s => {
            const j = s.val();
            j.students.forEach(sid => {
                db.ref(`students/${sid}/${j.sub}/${j.cat}`).once('value', st => {
                    const ts = st.val();
                    for (let k in ts) if (ts[k].jKey === jk) db.ref(`students/${sid}/${j.sub}/${j.cat}/${k}`).remove();
                });
            });
            db.ref(`journal/${jk}`).remove();
        });
    }

    function loadData(id, isT) {
        document.getElementById('sNameDisplay').innerText = students[id].name;
        db.ref('students/' + id).on('value', snap => {
            const data = snap.val() || {};
            const area = document.getElementById('debtListArea'); area.innerHTML = "";
            for (let sub in structure) {
                let div = document.createElement('div'); div.className = 'subject-group';
                div.innerHTML = `<h4>${sub}</h4>`;
                let hasDebt = false;
                structure[sub].forEach(cat => {
                    const ts = data[sub] && data[sub][cat] ? data[sub][cat] : {};
                    for (let k in ts) {
                        hasDebt = true;
                        div.innerHTML += `<div class="debt-row"><span class="date-badge">${ts[k].date}</span><b>${ts[k].val}</b></div>`;
                    }
                });
                if (hasDebt) area.appendChild(div);
            }
            if (area.innerHTML === "") area.innerHTML = "<p style='text-align:center;'>✅ Боргів немає!</p>";
        });
    }
</script>
</body>
</html>
