<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Шкільний монітор 4-А</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            /* Надійне посилання на твій фон з GitHub */
            background: #f4f0f9 url('https://raw.githubusercontent.com/vmorozz248/school-monitor/main/background.png') no-repeat center center fixed; 
            background-size: cover;
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
        }

        .container {
            background: rgba(255, 255, 255, 0.95); 
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            width: 90%;
            max-width: 700px;
            text-align: center;
        }

        h2 { color: #4a148c; margin-bottom: 20px; }

        .filter-section {
            margin-bottom: 25px;
            padding: 15px;
            background: #f3e5f5;
            border-radius: 15px;
            border: 1px solid #e1bee7;
        }

        select {
            width: 80%;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #9575cd;
            font-size: 16px;
            outline: none;
        }

        table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; }
        th { background-color: #7e57c2; color: white; padding: 12px; }
        td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
        
        .status-debt { color: #d32f2f; font-weight: bold; }
        .status-done { color: #388e3c; font-weight: bold; }

        .teacher-img {
            position: fixed;
            bottom: 10px;
            right: 20px;
            width: 140px;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>🏫 Шкільний монітор 4-А</h2>

        <div class="filter-section">
            <label for="subjectFilter">🔎 <b>Оберіть предмет:</b></label><br><br>
            <select id="subjectFilter" onchange="filterTable()">
                <option value="all">🌟 Усі предмети</option>
                <option value="math">📐 Математика</option>
                <option value="ua">🇺🇦 Українська мова</option>
                <option value="reading">📖 Читання</option>
                <option value="nature">🌍 Я досліджую світ</option>
            </select>
        </div>

        <table id="journalTable">
            <thead>
                <tr>
                    <th>Учень</th>
                    <th>Робота / Предмет</th>
                    <th>Статус</th>
                </tr>
            </thead>
            <tbody>
                <tr class="data-row" data-subject="math">
                    <td>Богдан</td>
                    <td>Математика: Ділення</td>
                    <td class="status-debt">Борг</td>
                </tr>
                <tr class="data-row" data-subject="ua">
                    <td>Валерія</td>
                    <td>Укр. мова: Диктант</td>
                    <td class="status-done">Виконано</td>
                </tr>
                <tr class="data-row" data-subject="reading">
                    <td>Артем</td>
                    <td>Читання: Переказ</td>
                    <td class="status-debt">Борг</td>
                </tr>
                <tr class="data-row" data-subject="nature">
                    <td>Марія</td>
                    <td>ЯДС: Проєкт про птахів</td>
                    <td class="status-done">Виконано</td>
                </tr>
                <tr class="data-row" data-subject="math">
                    <td>Микола</td>
                    <td>Математика: Задача №12</td>
                    <td class="status-debt">Борг</td>
                </tr>
            </tbody>
        </table>
    </div>

    <img src="https://i.postimg.cc/mD8P8p0c/teacher-character.png" alt="Вчителька" class="teacher-img">

    <script>
        function filterTable() {
            const selected = document.getElementById('subjectFilter').value;
            const rows = document.querySelectorAll('.data-row');

            rows.forEach(row => {
                const subject = row.getAttribute('data-subject');
                if (selected === 'all' || subject === selected) {
                    row.style.display = '';
                } else {
                    row.style.display = 'none';
                }
            });
        }
    </script>

</body>
</html>
