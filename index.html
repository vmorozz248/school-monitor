<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Шкільний монітор</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5 url('https://raw.githubusercontent.com/vmorozz248/school-monitor/main/background.jpg') no-repeat center center fixed; background-size: cover; margin: 0; padding: 15px; display: flex; justify-content: center; }
        .card { background: rgba(255, 255, 255, 0.98); padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); width: 100%; max-width: 550px; }
        .admin-panel { background: #fdfaff; border: 2px solid #61309e; padding: 15px; border-radius: 15px; margin-bottom: 20px; }
        
        /* ТАБЛИЧНИЙ СПИСОК УЧНІВ - НЕ З'ЇЖДЖАЄ */
        .student-grid { 
            display: flex; flex-wrap: wrap; gap: 5px; 
            background: white; padding: 10px; border: 1px solid #ddd; 
            border-radius: 10px; max-height: 180px; overflow-y: auto; 
        }
        .student-grid label { 
            width: 47%; display: flex; align-items: center; gap: 8px; 
            font-size: 13px; color: #4b1681; cursor: pointer; padding: 2px;
        }
        .student-grid input { width: 18px; height: 18px; cursor: pointer; }

        .tab-menu { display: flex; gap: 10px; margin-bottom: 15px; border-bottom: 2px solid #e9dcf5; }
        .tab { padding: 10px; cursor: pointer; font-weight: bold; color: #8352b2; }
        .tab.active { color: #61309e; border-bottom: 3px solid #61309e; }

        .journal-item { background: white; border: 1px solid #e9dcf5; padding: 10px; border-radius: 10px; margin-bottom: 10px; font-size: 13px; }
        .journal-header { display: flex; justify-content: space-between; font-weight: bold; color: #61309e; border-bottom: 1px solid #f3ebf9; padding-bottom: 5px; }
        .debtor-tag { display: inline-block; background: #f3ebf9; color: #61309e; padding: 2px 8px; border-radius: 10px; margin: 2px; cursor: pointer; }
        .debtor-tag:hover { background: #ffcccc; color: red; text-decoration: line-through; }

        h1 { color: #1a012b; text-align: center; font-size: 24px; margin-bottom: 10px; }
        select, input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 10px; margin-bottom: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #61309e; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .hidden { display: none; }
    </style>
</head>
<body>
<div class="card">
    <h1>Шкільний монітор</h1>

    <div id="adminPanel" class="admin-panel hidden">
        <div class="tab-menu">
            <div id="tab1" class="tab active" onclick="showTab(1)">➕ Додати борг</div>
            <div id="tab2" class="tab" onclick="showTab(2)">📓 Журнал розсилок</div>
        </div>

        <div id="view1">
            <label style="font-size:12px; font-weight:bold;">Кому додати? (Обрано: <span id="cnt">0</span>)</label>
            <div class="student-grid" id="chkBox"></div>
            <div style="display:flex; gap:5px; margin: 10px 0;">
                <button style="padding:5px; font-size:11px;" onclick="tgl(true)">Усі</button>
                <button style="padding:5px; font-size:11px;" onclick="tgl(false)">Скинути</button>
            </div>
            <select id="mSub"><option value="">-- Оберіть предмет --</option></select>
            <input type="text" id="mTask" placeholder="Назва роботи">
            <button onclick="addW()">Розіслати борг</button>
        </div>

        <div id="view2" class="hidden">
            <div id="journalList">Завантаження журналу...</div>
        </div>
    </div>

    <div id="lgn">
        <select id="sSel"><option value="">-- Учень --</option></select>
        <input type="text" id="pCod" placeholder="Код">
        <button onclick="chk()">Увійти</button>
    </div>

    <div id="res" class="hidden">
        <button onclick="location.reload()" style="width:auto; padding:5px 10px;">⬅ Назад</button>
        <h3 id="sName" style="text-align:center;"></h3>
        <div id="dList"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCaf5Zwl4mIxdReLgdoUCkzi1KWEMzeEpA",
        authDomain: "schoolmonitor-b1c8b.firebaseapp.com",
        databaseURL: "https://schoolmonitor-b1c8b-default-rtdb.firebaseio.com/",
        projectId: "schoolmonitor-b1c8b",
        storageBucket: "schoolmonitor-b1c8b.firebasestorage.app",
        messagingSenderId: "838073337449",
        appId: "1:838073337449:web:33a254365be4761b0544f8"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const sts = {
        "id1": "Астахова", "id2": "Бабенко", "id3": "Водолазька", "id4": "Гомонюк", "id5": "Деміденко",
        "id6": "Єлісеєв", "id7": "Іванець", "id8": "Калантаєва", "id9": "Лисих", "id10": "Оковитий",
        "id11": "Павлов", "id12": "Радченко", "id13": "Скабардіна", "id14": "Удовіка", "id15": "Філатова",
        "id16": "Холматова", "id17": "Шаповал"
    };
    const codes = {"id1":"26.12","id2":"01.04","id3":"13.02","id4":"15.02","id5":"01.10","id6":"11.12","id7":"05.07","id8":"12.02","id9":"31.01","id10":"17.06","id11":"26.04","id12":"25.04","id13":"15.01","id14":"27.10","id15":"24.06","id16":"04.03","id17":"04.05"};
    const str = {"Літ. читання":["Діагн. робота","Вірш","Творча"],"Укр. мова":["Діагн. робота","Інше"],"Математика":["Діагн. робота","Самост. робота"],"ЯДС":["Діагн. робота","Інше"],"Дизайн":["Творча"]};

    for (let id in sts) {
        document.getElementById('sSel').innerHTML += `<option value="${id}">${sts[id]}</option>`;
        document.getElementById('chkBox').innerHTML += `<label><input type="checkbox" value="${id}" onchange="upd()"> ${sts[id]}</label>`;
    }
    for (let s in str) str[s].forEach(c => document.getElementById('mSub').innerHTML += `<option value="${s}|${c}">${s} - ${c}</option>`);

    function showTab(n) {
        document.getElementById('view1').classList.toggle('hidden', n!==1);
        document.getElementById('view2').classList.toggle('hidden', n!==2);
        document.getElementById('tab1').classList.toggle('active', n===1);
        document.getElementById('tab2').classList.toggle('active', n===2);
        if(n===2) loadJournal();
    }

    function upd() { document.getElementById('cnt').innerText = document.querySelectorAll('#chkBox input:checked').length; }
    function tgl(v) { document.querySelectorAll('#chkBox input').forEach(c => c.checked = v); upd(); }

    function chk() {
        const id = document.getElementById('sSel').value;
        const code = document.getElementById('pCod').value.trim();
        if (code === "21.08") { document.getElementById('lgn').classList.add('hidden'); document.getElementById('adminPanel').classList.remove('hidden'); if(id){document.getElementById('res').classList.remove('hidden'); load(id,true);} }
        else if (id && codes[id] === code) { document.getElementById('lgn').classList.add('hidden'); document.getElementById('res').classList.remove('hidden'); load(id,false); }
        else alert("Помилка!");
    }

    function addW() {
        const sel = Array.from(document.querySelectorAll('#chkBox input:checked')).map(c => c.value);
        const sub = document.getElementById('mSub').value.split('|');
        const task = document.getElementById('mTask').value.trim();
        if (!task || sel.length === 0) return alert("Заповніть усе!");
        const d = new Date().toLocaleDateString('uk-UA').slice(0, 5);
        const jKey = db.ref('journal').push().key;
        let updates = {};
        sel.forEach(sid => {
            const k = db.ref().child('students').push().key;
            updates[`students/${sid}/${sub[0]}/${sub[1]}/${k}`] = {date: d, val: task, jKey: jKey};
        });
        updates[`journal/${jKey}`] = {date: d, task: task, sub: sub[0], cat: sub[1], students: sel};
        db.ref().update(updates).then(() => { alert("Розіслано!"); tgl(false); document.getElementById('mTask').value=""; });
    }

    function loadJournal() {
        db.ref('journal').on('value', snap => {
            const list = document.getElementById('journalList');
            list.innerHTML = "";
            const data = snap.val();
            if (!data) { list.innerText = "Порожньо"; return; }
            Object.keys(data).reverse().forEach(jKey => {
                const j = data[jKey];
                let html = `<div class="journal-item"><div class="journal-header"><span onclick="editJ('${jKey}','${j.task}')">✏️ ${j.sub}: ${j.task}</span><span style="color:red;cursor:pointer" onclick="delJ('${jKey}')">🗑</span></div><div style="margin-top:5px;">`;
                if(j.students) {
                    j.students.forEach(sid => {
                        html += `<span class="debtor-tag" onclick="removeOne('${jKey}','${sid}')">${sts[sid]} ×</span>`;
                    });
                }
                html += `</div></div>`;
                list.innerHTML += html;
            });
        });
    }

    function editJ(key, cur) {
        const n = prompt("Нова назва:", cur);
        if(!n) return;
        db.ref(`journal/${key}`).once('value', s => {
            const j = s.val();
            let up = {};
            up[`journal/${key}/task`] = n;
            j.students.forEach(sid => {
                db.ref(`students/${sid}/${j.sub}/${j.cat}`).once('value', st => {
                    const tasks = st.val();
                    for(let k in tasks) if(tasks[k].jKey === key) up[`students/${sid}/${j.sub}/${j.cat}/${k}/val`] = n;
                    db.ref().update(up);
                });
            });
        });
    }

    function removeOne(jKey, sid) {
        if(!confirm(`Учень здав роботу? Видалити борг для ${sts[sid]}?`)) return;
        db.ref(`journal/${jKey}`).once('value', s => {
            const j = s.val();
            const newSts = j.students.filter(id => id !== sid);
            db.ref(`journal/${jKey}/students`).set(newSts);
            db.ref(`students/${sid}/${j.sub}/${j.cat}`).once('value', st => {
                const tasks = st.val();
                for(let k in tasks) if(tasks[k].jKey === jKey) db.ref(`students/${sid}/${j.sub}/${j.cat}/${k}`).remove();
            });
        });
    }

    function delJ(key) {
        if(!confirm("Видалити всю розсилку для всіх учнів?")) return;
        db.ref(`journal/${key}`).once('value', s => {
            const j = s.val();
            j.students.forEach(sid => {
                db.ref(`students/${sid}/${j.sub}/${j.cat}`).once('value', st => {
                    const tasks = st.val();
                    for(let k in tasks) if(tasks[k].jKey === key) db.ref(`students/${sid}/${j.sub}/${j.cat}/${k}`).remove();
                });
            });
            db.ref(`journal/${key}`).remove();
        });
    }

    function load(id, edit) {
        document.getElementById('sName').innerText = sts[id];
        db.ref('students/' + id).on('value', snap => {
            const data = snap.val() || {};
            const list = document.getElementById('dList'); list.innerHTML = "";
            for (let s in str) {
                let div = document.createElement('div'); div.style.border="1px solid #eee"; div.style.padding="10px"; div.style.marginTop="10px";
                div.innerHTML = `<h4 style="margin:0; color:#61309e;">${s}</h4>`;
                str[s].forEach(cat => {
                    const items = (data[s] && data[s][cat]) ? data[s][cat] : {};
                    for (let k in items) {
                        if (items[k].val) div.innerHTML += `<p style="font-size:14px;"><span style="background:#8352b2;color:#fff;padding:2px 5px;border-radius:4px;">${items[k].date}</span> <b>${items[k].val}</b></p>`;
                    }
                });
                list.appendChild(div);
            }
        });
    }
</script>
</body>
</html>
