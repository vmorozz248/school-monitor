<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Шкільний монітор</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f0f9 url('https://raw.githubusercontent.com/vmorozz248/school-monitor/main/background.jpg') no-repeat center center fixed; background-size: cover; margin: 0; padding: 10px; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow-x: hidden; }
        .card { background: rgba(255, 255, 255, 0.98); padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); width: 100%; max-width: 500px; box-sizing: border-box; position: relative; z-index: 2; }
        
        /* АВАТАР - Використовуємо пряме посилання на оригінал */
        .teacher-avatar { position: fixed; bottom: -20px; right: -40px; width: 380px; z-index: 100; transition: all 0.4s ease; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.15)); cursor: pointer; }
        .teacher-avatar:hover { transform: scale(1.03) translate(-10px, -5px); }
        .speech-bubble { position: fixed; bottom: 340px; right: 220px; background: white; padding: 12px 20px; border-radius: 25px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); font-size: 15px; font-weight: bold; color: #61309e; display: none; z-index: 101; border: 2px solid #e9dcf5; max-width: 200px; text-align: center; }
        .teacher-avatar:hover + .speech-bubble { display: block; }
        
        @media (max-width: 1000px) { .teacher-avatar, .speech-bubble { display: none !important; } }

        /* СПИСОК УЧНІВ */
        .student-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; background: white; border: 1px solid #ddd; border-radius: 12px; padding: 10px; margin-bottom: 10px; max-height: 250px; overflow-y: auto; }
        .student-grid label { display: flex; align-items: center; gap: 8px; font-size: 14px; color: #4b1681; border: 1px solid #f0e6f7; padding: 10px; border-radius: 8px; cursor: pointer; }
        
        .tab-menu { display: flex; gap: 10px; margin-bottom: 15px; border-bottom: 2px solid #e9dcf5; }
        .tab { padding: 10px; cursor: pointer; font-weight: bold; color: #8352b2; }
        .tab.active { color: #61309e; border-bottom: 3px solid #61309e; }
        h1 { color: #1a012b; text-align: center; font-size: 22px; margin: 0 0 10px 0; }
        button { width: 100%; padding: 12px; background: #61309e; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<img src="https://i.ibb.co/3Y0DKmpg/Gemini-Generated-Image-21e37521e37521e3.png" class="teacher-avatar" alt="Вчителька">
<div class="speech-bubble">Нам точно є над чим ще попрацювати! ✨</div>

<div class="card">
    <h1>Шкільний монітор</h1>
    
    <div id="adminPanel" class="hidden">
        <div class="tab-menu">
            <div id="tab1" class="tab active" onclick="showTab(1)">➕ Додати</div>
            <div id="tab2" class="tab" onclick="showTab(2)">📓 Журнал</div>
        </div>
        <div id="view1">
            <div class="student-grid" id="chkArea"></div>
            <button onclick="sendDebt()">Розіслати борг</button>
        </div>
        <div id="view2" class="hidden"><div id="journalArea"></div></div>
    </div>

    <div id="loginForm">
        <select id="uSel" style="width:100%; padding:10px; margin-bottom:10px; border-radius:10px; border:2px solid #e9dcf5;"></select>
        <input type="text" id="pInp" placeholder="Код" style="width:100%; padding:10px; margin-bottom:10px; border-radius:10px; border:2px solid #e9dcf5;">
        <button onclick="login()">Увійти</button>
    </div>

    <div id="resultView" class="hidden">
        <button onclick="location.reload()" style="width:auto; padding:5px 15px; margin-bottom:10px;">⬅ Назад</button>
        <h3 id="sNameTitle" style="text-align:center;"></h3>
        <div id="debtListArea"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCaf5Zwl4mIxdReLgdoUCkzi1KWEMzeEpA",
        authDomain: "schoolmonitor-b1c8b.firebaseapp.com",
        databaseURL: "https://schoolmonitor-b1c8b-default-rtdb.firebaseio.com/",
        projectId: "schoolmonitor-b1c8b",
        storageBucket: "schoolmonitor-b1c8b.firebasestorage.app",
        messagingSenderId: "838073337449",
        appId: "1:838073337449:web:33a254365be4761b0544f8"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const students = {
        "id1": { name: "Астахова Є.", code: "26.12" }, "id2": { name: "Бабенко П.", code: "01.04" },
        "id3": { name: "Водолазька С.", code: "13.02" }, "id4": { name: "Гомонюк С.", code: "15.02" },
        "id5": { name: "Деміденко А.", code: "01.10" }, "id6": { name: "Єлісеєв Д.", code: "11.12" },
        "id7": { name: "Іванець Т.", code: "05.07" }, "id8": { name: "Калантаєва А.", code: "12.02" },
        "id9": { name: "Лисих Л.", code: "31.01" }, "id10": { name: "Оковитий М.", code: "17.06" },
        "id11": { name: "Павлов Т.", code: "26.04" }, "id12": { name: "Радченко В.", code: "25.04" },
        "id13": { name: "Скабардіна М.", code: "15.01" }, "id14": { name: "Удовіка М.", code: "27.10" },
        "id15": { name: "Філатова У.", code: "24.06" }, "id16": { name: "Холматова В.", code: "04.03" },
        "id17": { name: "Шаповал Т.", code: "04.05" }
    };

    const sortedIds = Object.keys(students).sort((a,b) => students[a].name.localeCompare(students[b].name));
    
    // ВІДОБРАЖЕННЯ СПИСКУ
    const chkArea = document.getElementById('chkArea');
    const uSel = document.getElementById('uSel');
    sortedIds.forEach(id => {
        chkArea.innerHTML += `<label><input type="checkbox" value="${id}"> ${students[id].name.split(' ')[0]}</label>`;
        uSel.innerHTML += `<option value="${id}">${students[id].name}</option>`;
    });

    function login() {
        const id = uSel.value, code = document.getElementById('pInp').value.trim();
        if (code === "21.08") {
            if (id) { document.getElementById('loginForm').classList.add('hidden'); document.getElementById('resultView').classList.remove('hidden'); loadData(id); }
            else { document.getElementById('loginForm').classList.add('hidden'); document.getElementById('adminPanel').classList.remove('hidden'); }
        } else if (id && students[id].code === code) {
            document.getElementById('loginForm').classList.add('hidden'); document.getElementById('resultView').classList.remove('hidden'); loadData(id);
        } else alert("Помилка!");
    }

    function loadData(id) {
        document.getElementById('sNameTitle').innerText = students[id].name;
        db.ref('students/' + id).on('value', snap => {
            const data = snap.val() || {}, area = document.getElementById('debtListArea'); area.innerHTML = "";
            for (let sub in data) {
                let div = `<div style="background:#fdfaff; border:1px solid #e9dcf5; padding:12px; border-radius:15px; margin-top:15px;"><h4>${sub}</h4>`;
                for (let cat in data[sub]) {
                    for (let k in data[sub][cat]) {
                        const d = data[sub][cat][k];
                        div += `<div style="display:flex; gap:10px; margin-bottom:10px; background:white; padding:10px; border-radius:12px; border:1px solid #f3ebf9;"><b>${d.date}</b>: ${d.val}</div>`;
                    }
                }
                area.innerHTML += div + `</div>`;
            }
        });
    }

    function showTab(n) {
        document.getElementById('view1').classList.toggle('hidden', n !== 1);
        document.getElementById('view2').classList.toggle('hidden', n !== 2);
    }
</script>
</body>
</html>
