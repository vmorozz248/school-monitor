    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f0f9 url('https://raw.githubusercontent.com/vmorozz248/school-monitor/main/background.jpg') no-repeat center center fixed; background-size: cover; margin: 0; padding: 10px; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow-x: hidden; }
        .card { background: rgba(255, 255, 255, 0.98); padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); width: 100%; max-width: 500px; box-sizing: border-box; position: relative; z-index: 2; }
        
        /* ВЧИТЕЛЬКА - ТЕПЕР ТОЧНО БЕЗ ФОНУ */
        .teacher-avatar { 
            position: fixed; 
            bottom: -20px; 
            right: -40px; 
            width: 380px; 
            z-index: 100; 
            transition: all 0.4s ease; 
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.15)); 
            cursor: pointer; 
        }
        .teacher-avatar:hover { transform: scale(1.03) translate(-10px, -5px); }
        
        .speech-bubble { 
            position: fixed; 
            bottom: 340px; 
            right: 220px; 
            background: white; 
            padding: 12px 20px; 
            border-radius: 25px; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.1); 
            font-size: 15px; 
            font-weight: bold; 
            color: #61309e; 
            display: none; 
            z-index: 101; 
            border: 2px solid #e9dcf5;
            max-width: 200px;
            text-align: center;
        }
        .teacher-avatar:hover + .speech-bubble { display: block; animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop { from { transform: scale(0); } to { transform: scale(1); } }
        
        @media (max-width: 1000px) { .teacher-avatar, .speech-bubble { display: none !important; } }

        /* РІВНЕ МЕНЮ УЧНІВ */
        .student-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; background: white; border: 1px solid #ddd; border-radius: 12px; padding: 10px; margin-bottom: 10px; max-height: 250px; overflow-y: auto; }
        .student-grid label { display: flex; align-items: center; justify-content: space-between; font-size: 14px; color: #4b1681; border: 1px solid #f0e6f7; padding: 10px; border-radius: 8px; box-sizing: border-box; min-height: 45px; }
        
        .tab-menu { display: flex; gap: 10px; margin-bottom: 15px; border-bottom: 2px solid #e9dcf5; }
        .tab { padding: 10px; cursor: pointer; font-weight: bold; color: #8352b2; font-size: 14px; }
        .tab.active { color: #61309e; border-bottom: 3px solid #61309e; }
        h1 { color: #1a012b; text-align: center; font-size: 22px; margin: 0 0 10px 0; }
        button { width: 100%; padding: 12px; background: #61309e; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .hidden { display: none !important; }
    </style>
</head>
