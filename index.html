<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Шкільний монітор</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-image: url('background.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }
        .card {
            background: rgba(255, 255, 255, 0.98);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(75, 22, 129, 0.4);
            width: 100%;
            max-width: 550px;
            position: relative;
        }
        .help-btn {
            position: absolute; top: 20px; right: 20px; width: 35px; height: 35px;
            background: #e9dcf5; color: #61309e; border: 2px solid #61309e;
            border-radius: 50%; font-weight: bold; font-size: 20px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .admin-panel {
            background: #f3ebf9; border: 2px solid #61309e; padding: 20px; border-radius: 15px; margin-bottom: 25px;
        }
        .report-box {
            background: white; border: 1px solid #cbb2eb; padding: 15px; border-radius: 10px; margin-top: 15px; font-size: 14px;
        }
        h1 { color: #1a012b; text-align: center; }
        .subtitle { color: #8352b2; text-align: center; margin-bottom: 25px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #4b1681; font-size: 18px; }
        select, input {
            width: 100%; padding: 12px; border: 2px solid #e9dcf5; border-radius: 12px; font-size: 18px; box-sizing: border-box; margin-bottom: 15px;
        }
        button {
            width: 100%; padding: 15px; background-color: #61309e; color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; margin-bottom: 10px;
        }
        .subject-group { background: #fdfaff; border-radius: 15px; padding: 15px; margin-top: 20px; border: 1px solid #e9dcf5; }
        .subject-group h4 { color: #61309e; margin: 0; border-bottom: 2px solid #cbb2eb; }
        .multi-row { display: flex; align-items: center; gap: 10px; background: white; padding: 10px; border-radius: 10px; margin-bottom: 8px; border: 1px solid #f3ebf9; }
        .date-cell { background: #8352b2; color: white; padding: 5px 10px; border-radius: 8px; font-weight: bold; }
        .status-debt { color: #c0392b; font-weight: bold; flex-grow: 1; }
        .status-ok { color: #27ae60; font-weight: bold; flex-grow: 1; }
        .hidden { display: none; }
        .editable-cat { color: #4b1681; font-weight: 800; cursor: pointer; text-decoration: underline dotted; }
    </style>
</head>
<body>

<div class="card">
    <div class="help-btn" onclick="alert('Інструкція: 1. Оберіть учня. 2. Введіть код. 3. Перевірте борги.')">?</div>
    <h1>Шкільний монітор</h1>
    <p class="subtitle">Система обліку робіт</p>

    <div id="adminPanel" class="admin-panel hidden">
        <h3 style="color:#61309e; margin:0 0 15px 0;">Панель вчителя 👩‍🏫</h3>
        
        <label style="font-size:14px;">Масове додавання:</label>
        <select id="massSub" style="padding:8px; font-size:14px;"></select>
        <input type="text" id="massTask" placeholder="Назва нової роботи" style="padding:8px; font-size:14px;">
        <button onclick="addMassWork()" style="background:#4b1681; padding:10px; font-size:14px;">Додати всім учням</button>
        
        <hr style="border:1px solid #cbb2eb; margin:15px 0;">
        
        <button onclick="generateReport()" style="background:#27ae60; padding:10px; font-size:14px;">📊 Згенерувати звіт по боргах</button>
        <div id="reportArea" class="report-box hidden"></div>
    </div>

    <label>Оберіть учня:</label>
    <select id="studentSelect">
        <option value="">-- Список учнів --</option>
        <option value="id1">Астахова Євгенія</option>
        <option value="id2">Бабенко Поліна</option>
        <option value="id3">Водолазька Соломія</option>
        <option value="id4">Гомонюк Софія</option>
        <option value="id5">Деміденко Аріна</option>
        <option value="id6">Єлісеєв Дмитро</option>
        <option value="id7">Іванець Тімур</option>
        <option value="id8">Калантаєва Анастасія</option>
        <option value="id9">Лисих Ліана</option>
        <option value="id10">Оковитий Максим</option>
        <option value="id11">Павлов Тимур</option>
        <option value="id12">Радченко Владислава</option>
        <option value="id13">Скабардіна Мілослава</option>
        <option value="id14">Удовіка Макар</option>
        <option value="id15">Філатова Ульяна</option>
        <option value="id16">Холматова Віолетта</option>
        <option value="id17">Шаповал Тимур</option>
    </select>

    <label>Код доступу:</label>
    <input type="text" id="passCode" placeholder="Наприклад: 01.01">

    <button onclick="checkData()">Увійти в кабінет</button>

    <div id="result" class="hidden">
        <h3 id="studentNameDisplay" style="text-align:center; color:#4b1681;"></h3>
        <div id="debtList"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCaf5Zwl4mIxdReLgdoUCkzi1KWEMzeEpA",
        authDomain: "schoolmonitor-b1c8b.firebaseapp.com",
        databaseURL: "https://schoolmonitor-b1c8b-default-rtdb.firebaseio.com/",
        projectId: "schoolmonitor-b1c8b",
        storageBucket: "schoolmonitor-b1c8b.firebasestorage.app",
        messagingSenderId: "838073337449",
        appId: "1:838073337449:web:33a254365be4761b0544f8"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    const students = {
        "id1": { code: "26.12", name: "Астахова Євгенія" }, "id2": { code: "01.04", name: "Бабенко Поліна" },
        "id3": { code: "13.02", name: "Водолазька Соломія" }, "id4": { code: "15.02", name: "Гомонюк Софія" },
        "id5": { code: "01.10", name: "Деміденко Аріна" }, "id6": { code: "11.12", name: "Єлісеєв Дмитро" },
        "id7": { code: "05.07", name: "Іванець Тімур" }, "id8": { code: "12.02", name: "Калантаєва Анастасія" },
        "id9": { code: "31.01", name: "Лисих Ліана" }, "id10": { code: "17.06", name: "Оковитий Максим" },
        "id11": { code: "26.04", name: "Павлов Тимур" }, "id12": { code: "25.04", name: "Радченко Владислава" },
        "id13": { code: "15.01", name: "Скабардіна Мілослава" }, "id14": { code: "27.10", name: "Удовіка Макар" },
        "id15": { code: "24.06", name: "Філатова Ульяна" }, "id16": { code: "04.03", name: "Холматова Віолетта" },
        "id17": { code: "04.05", name: "Шаповал Тимур" }
    };

    const structure = {
        "Літературне читання": ["Діагностична робота", "Вірш", "Творча робота"],
        "Українська мова": ["Діагностична робота", "Свій вид діяльності"],
        "Математика": ["Діагностична робота", "Самостійна робота"],
        "Я досліджую світ": ["Діагностична робота", "Свій вид діяльності"],
        "Дизайн і технології": ["Творча робота"]
    };

    const mSub = document.getElementById('massSub');
    for (let s in structure) {
        structure[s].forEach(c => {
            let opt = document.createElement('option');
            opt.value = s + "|" + c; opt.innerText = s + " - " + c;
            mSub.appendChild(opt);
        });
    }

    function checkData() {
        const id = document.getElementById('studentSelect').value;
        const code = document.getElementById('passCode').value.trim();
        const adminP = document.getElementById('adminPanel');

        if (code === "21.08") {
            adminP.classList.remove('hidden');
            if(id) { loadData(id, true); document.getElementById('result').classList.remove('hidden'); }
        } else if (id && students[id].code === code) {
            adminP.classList.add('hidden');
            document.getElementById('result').classList.remove('hidden');
            loadData(id, false);
        } else {
            alert("Невірний код!");
        }
    }

    async function generateReport() {
        const area = document.getElementById('reportArea');
        area.classList.remove('hidden');
        area.innerHTML = "⏳ Завантаження звіту...";
        
        const snap = await database.ref('students').once('value');
        const allData = snap.val() || {};
        let reportHtml = "<strong>Звіт по заборгованостях:</strong><br><br>";
        let hasDebts = false;

        for (let sub in structure) {
            structure[sub].forEach(cat => {
                let debtGroup = {};
                for (let sid in students) {
                    const studentDebts = (allData[sid] && allData[sid][sub] && allData[sid][sub][cat]) ? allData[sid][sub][cat] : {};
                    for (let dKey in studentDebts) {
                        const taskName = studentDebts[dKey].val;
                        if (taskName) {
                            if (!debtGroup[taskName]) debtGroup[taskName] = [];
                            debtGroup[taskName].push(students[sid].name);
                        }
                    }
                }
                
                for (let task in debtGroup) {
                    hasDebts = true;
                    reportHtml += `● <u>${sub} (${task})</u>: <span style="color:red">${debtGroup[task].join(', ')}</span><br><br>`;
                }
            });
        }
        area.innerHTML = hasDebts ? reportHtml : "✅ Боргів немає у жодного учня!";
    }

    function addMassWork() {
        const val = document.getElementById('massSub').value.split('|');
        const task = document.getElementById('massTask').value.trim();
        if (!task) return;
        if (confirm(`Додати всім: ${task}?`)) {
            for (let sid in students) {
                const key = database.ref().child('students').push().key;
                database.ref(`students/${sid}/${val[0]}/${val[1]}/${key}`).set({date: "02.03", val: task});
            }
            alert("Додано!");
        }
    }

    function loadData(id, canEdit) {
        document.getElementById('studentNameDisplay').innerText = students[id].name;
        database.ref('students/' + id).on('value', (snap) => {
            const data = snap.val() || {};
            const list = document.getElementById('debtList');
            list.innerHTML = "";
            for (let sub in structure) {
                let div = document.createElement('div');
                div.className = 'subject-group';
                div.innerHTML = `<h4>${sub}</h4>`;
                structure[sub].forEach(cat => {
                    const items = (data[sub] && data[sub][cat]) ? data[sub][cat] : {};
                    for (let key in items) {
                        if (!canEdit && !items[key].val) continue;
                        let row = document.createElement('div');
                        row.className = 'multi-row';
                        row.innerHTML = `<span class="date-cell">${items[key].date}</span><span class="${items[key].val ? 'status-debt':'status-ok'}">${items[key].val || 'немає ✅'}</span>`;
                        if(canEdit) {
                            let del = document.createElement('button');
                            del.innerText = "×"; del.style.width="30px"; del.style.background="none"; del.style.color="red"; del.style.border="none";
                            del.onclick = () => database.ref(`students/${id}/${sub}/${cat}/${key}`).remove();
                            row.appendChild(del);
                        }
                        div.appendChild(row);
                    }
                });
                list.appendChild(div);
            }
        });
    }
</script>
</body>
</html>
