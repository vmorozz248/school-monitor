<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Шкільний монітор</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f0f9 url('https://raw.githubusercontent.com/vmorozz248/school-monitor/main/background.jpg') no-repeat center center fixed; background-size: cover; margin: 0; padding: 10px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: rgba(255, 255, 255, 0.98); padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); width: 100%; max-width: 520px; box-sizing: border-box; }
        .admin-panel { background: #fdfaff; border: 2px solid #61309e; padding: 15px; border-radius: 15px; margin-bottom: 20px; }
        .student-table { width: 100%; background: white; border: 1px solid #ddd; border-radius: 10px; padding: 10px; margin-bottom: 10px; max-height: 180px; overflow-y: auto; }
        .student-table table { width: 100%; border-collapse: collapse; }
        .student-table td { padding: 4px; font-size: 13px; color: #4b1681; width: 50%; }
        .tab-menu { display: flex; gap: 10px; margin-bottom: 15px; border-bottom: 2px solid #e9dcf5; }
        .tab { padding: 10px; cursor: pointer; font-weight: bold; color: #8352b2; font-size: 14px; }
        .tab.active { color: #61309e; border-bottom: 3px solid #61309e; }
        
        /* ЖУРНАЛ */
        .journal-card { background: white; border: 1px solid #e9dcf5; padding: 12px; border-radius: 12px; margin-bottom: 10px; }
        .journal-header { font-weight: bold; color: #61309e; font-size: 14px; cursor: pointer; display: block; border-bottom: 1px solid #eee; padding-bottom: 5px; margin-bottom: 8px; }
        .debtor-tag { display: inline-block; background: #f3ebf9; color: #61309e; padding: 3px 8px; border-radius: 10px; margin: 2px; cursor: pointer; font-size: 11px; font-weight: bold; transition: 0.2s; }
        .debtor-tag:hover { background: #ffcccc; color: #c0392b; text-decoration: line-through; }

        /* ВІКНО РЕДАГУВАННЯ */
        #editModal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 20px; border-radius: 20px; width: 90%; max-width: 400px; box-shadow: 0 5px 20px rgba(0,0,0,0.3); }

        /* КАРТКИ В УЧНЯ */
        .subject-group { background: #fdfaff; border: 1px solid #e9dcf5; padding: 12px; border-radius: 15px; margin-top: 15px; }
        .subject-group h4 { color: #61309e; margin: 0 0 10px 0; border-bottom: 2px solid #e9dcf5; padding-bottom: 5px; }
        .debt-row { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 10px; background: white; padding: 10px; border-radius: 12px; border: 1px solid #f3ebf9; }
        .date-btn { background: #61309e; color: white; padding: 4px 8px; border-radius: 8px; font-size: 11px; font-weight: bold; min-width: 45px; text-align: center; flex-shrink: 0; box-shadow: 0 2px 0 #3e1d66; }
        .cat-badge { color: #8352b2; font-size: 10px; font-weight: bold; text-transform: uppercase; }
        .task-name { color: #1a012b; font-size: 15px; }
        
        h1 { color: #1a012b; text-align: center; font-size: 24px; margin: 0 0 10px 0; }
        select, input { width: 100%; padding: 12px; border: 2px solid #e9dcf5; border-radius: 10px; margin-bottom: 10px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; background: #61309e; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .hidden { display: none; }
        #counter { font-size: 12px; color: #61309e; font-weight: bold; margin-bottom: 5px; display: block; }
    </style>
</head>
<body>

<div id="editModal" class="hidden">
    <div class="modal-content">
        <h3 style="color:#61309e; margin-top:0;">Редагувати роботу</h3>
        <label style="font-size:12px;">Змінити дату:</label>
        <input type="date" id="modalDate">
        <label style="font-size:12px;">Назва роботи:</label>
        <input type="text" id="modalTask">
        <div style="display:flex; gap:10px;">
            <button onclick="saveEdit()" style="background:#27ae60;">Зберегти</button>
            <button onclick="closeModal()" style="background:#888;">Скасувати</button>
        </div>
    </div>
</div>

<div class="card">
    <h1>Шкільний монітор</h1>
    <div id="adminPanel" class="admin-panel hidden">
        <div class="tab-menu">
            <div id="tab1" class="tab active" onclick="showTab(1)">➕ Додати</div>
            <div id="tab2" class="tab" onclick="showTab(2)">📓 Журнал</div>
        </div>
        <div id="view1">
            <span id="counter">Обрано: 0</span>
            <div class="student-table"><table id="chkTable"></table></div>
            <div style="display:flex; gap:10px; margin-bottom:10px;">
                <button style="padding:6px; font-size:12px; background:#cbb2eb; color:#4b1681;" onclick="selectAll(true)">Усі</button>
                <button style="padding:6px; font-size:12px; background:#cbb2eb; color:#4b1681;" onclick="selectAll(false)">Скинути</button>
            </div>
            <select id="subSel"><option value="">-- Предмет --</option></select>
            <input type="date" id="dateInp">
            <input type="text" id="taskInp" placeholder="Назва роботи">
            <button onclick="sendDebt()">Розіслати борг</button>
        </div>
        <div id="view2" class="hidden">
            <div id="journalArea">Завантаження...</div>
        </div>
    </div>
    <div id="loginForm">
        <select id="uSel"><option value="">-- Оберіть учня --</option></select>
        <input type="text" id="pInp" placeholder="Код" onkeypress="if(event.key==='Enter') login()">
        <button onclick="login()">Увійти</button>
    </div>
    <div id="resultView" class="hidden">
        <button onclick="location.reload()" style="width:auto; padding:5px 15px; margin-bottom:10px; font-size:12px;">⬅ Назад</button>
        <h3 id="sNameTitle" style="text-align:center; color:#4b1681; margin:0 0 10px 0;"></h3>
        <div id="debtListArea"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCaf5Zwl4mIxdReLgdoUCkzi1KWEMzeEpA",
        authDomain: "schoolmonitor-b1c8b.firebaseapp.com",
        databaseURL: "https://schoolmonitor-b1c8b-default-rtdb.firebaseio.com/",
        projectId: "schoolmonitor-b1c8b",
        storageBucket: "schoolmonitor-b1c8b.firebasestorage.app",
        messagingSenderId: "838073337449",
        appId: "1:838073337449:web:33a254365be4761b0544f8"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    document.getElementById('dateInp').valueAsDate = new Date();

    const students = {
        "id1": { name: "Астахова Є.", code: "26.12" }, "id2": { name: "Бабенко П.", code: "01.04" },
        "id3": { name: "Водолазька С.", code: "13.02" }, "id4": { name: "Гомонюк С.", code: "15.02" },
        "id5": { name: "Деміденко А.", code: "01.10" }, "id6": { name: "Єлісеєв Д.", code: "11.12" },
        "id7": { name: "Іванець Т.", code: "05.07" }, "id8": { name: "Калантаєва А.", code: "12.02" },
        "id9": { name: "Лисих Л.", code: "31.01" }, "id10": { name: "Оковитий М.", code: "17.06" },
        "id11": { name: "Павлов Т.", code: "26.04" }, "id12": { name: "Радченко В.", code: "25.04" },
        "id13": { name: "Скабардіна М.", code: "15.01" }, "id14": { name: "Удовіка М.", code: "27.10" },
        "id15": { name: "Філатова У.", code: "24.06" }, "id16": { name: "Холматова В.", code: "04.03" },
        "id17": { name: "Шаповал Т.", code: "04.05" }
    };
    const structure = {
        "Літературне читання": ["Діагностична робота", "Вірш", "Творча робота"],
        "Українська мова": ["Діагностична робота", "Інше"],
        "Математика": ["Діагностична робота", "Самостійна робота"],
        "Я досліджую світ": ["Діагностична робота", "Інше"],
        "Дизайн і технології": ["Творча робота"]
    };

    let currentEdit = null; 

    const table = document.getElementById('chkTable');
    let row;
    Object.keys(students).forEach((id, idx) => {
        if (idx % 2 === 0) row = table.insertRow();
        row.insertCell().innerHTML = `<label><input type="checkbox" value="${id}" onchange="updateCounter()"> ${students[id].name.split(' ')[0]}</label>`;
        document.getElementById('uSel').innerHTML += `<option value="${id}">${students[id].name}</option>`;
    });
    const subSel = document.getElementById('subSel');
    for (let s in structure) structure[s].forEach(c => subSel.innerHTML += `<option value="${s}|${c}">${s} - ${c}</option>`);

    function updateCounter() { document.getElementById('counter').innerText = "Обрано: " + document.querySelectorAll('#chkTable input:checked').length; }
    function showTab(n) {
        document.getElementById('view1').classList.toggle('hidden', n !== 1);
        document.getElementById('view2').classList.toggle('hidden', n !== 2);
        document.getElementById('tab1').classList.toggle('active', n === 1);
        document.getElementById('tab2').classList.toggle('active', n === 2);
        if (n === 2) loadJournal();
    }
    function selectAll(v) { document.querySelectorAll('#chkTable input').forEach(c => c.checked = v); updateCounter(); }

    function login() {
        const id = document.getElementById('uSel').value, code = document.getElementById('pInp').value.trim();
        if (code === "21.08") {
            if (id) { document.getElementById('loginForm').classList.add('hidden'); document.getElementById('resultView').classList.remove('hidden'); loadData(id); }
            else { document.getElementById('loginForm').classList.add('hidden'); document.getElementById('adminPanel').classList.remove('hidden'); }
        } else if (id && students[id].code === code) {
            document.getElementById('loginForm').classList.add('hidden'); document.getElementById('resultView').classList.remove('hidden'); loadData(id);
        } else alert("Помилка!");
    }

    function sendDebt() {
        const selected = Array.from(document.querySelectorAll('#chkTable input:checked')).map(c => c.value);
        const subData = document.getElementById('subSel').value.split('|'), task = document.getElementById('taskInp').value.trim(), rawDate = document.getElementById('dateInp').value;
        if (!task || selected.length === 0 || !subData[0] || !rawDate) return alert("Заповніть усе!");
        const d = new Date(rawDate);
        const formattedDate = d.getDate().toString().padStart(2, '0') + '.' + (d.getMonth() + 1).toString().padStart(2, '0');
        const sortKey = (d.getMonth() + 1).toString().padStart(2, '0') + d.getDate().toString().padStart(2, '0');
        
        selected.forEach(sid => {
            const tKey = db.ref().child('students').push().key;
            db.ref(`students/${sid}/${subData[0]}/${subData[1]}/${tKey}`).set({ date: formattedDate, val: task, sortDate: sortKey, fullDate: rawDate });
        });
        alert("Розіслано!"); selectAll(false); document.getElementById('taskInp').value = "";
    }

    function loadJournal() {
        db.ref('students').on('value', snap => {
            const data = snap.val() || {}, area = document.getElementById('journalArea');
            area.innerHTML = ""; let summary = {};
            for (let sid in data) {
                for (let sub in data[sid]) {
                    if (sub === "config") continue;
                    for (let cat in data[sid][sub]) {
                        for (let tid in data[sid][sub][cat]) {
                            const t = data[sid][sub][cat][tid];
                            const key = `${sub}|${cat}|${t.val}|${t.date}`;
                            if (!summary[key]) summary[key] = { sub, cat, task: t.val, date: t.date, fullDate: t.fullDate || '', students: [] };
                            summary[key].students.push({sid, tid});
                        }
                    }
                }
            }
            Object.values(summary).reverse().forEach(item => {
                area.innerHTML += `<div class="journal-card">
                    <span class="journal-header" onclick="openEditModal('${item.sub}','${item.cat}','${item.task}','${item.fullDate}')">✏️ ${item.date} - ${item.sub}: ${item.task}</span>
                    ${item.students.map(st => `<span class="debtor-tag" onclick="delOne('${st.sid}','${item.sub}','${item.cat}','${st.tid}')">${students[st.sid].name.split(' ')[0]}</span>`).join('')}
                </div>`;
            });
        });
    }

    function openEditModal(sub, cat, task, fullDate) {
        currentEdit = { sub, cat, oldTask: task };
        document.getElementById('modalTask').value = task;
        document.getElementById('modalDate').value = fullDate || new Date().toISOString().split('T')[0];
        document.getElementById('editModal').classList.remove('hidden');
    }

    function closeModal() { document.getElementById('editModal').classList.add('hidden'); }

    function saveEdit() {
        const newTask = document.getElementById('modalTask').value.trim();
        const newRawDate = document.getElementById('modalDate').value;
        if (!newTask || !newRawDate) return alert("Заповніть поля!");

        const d = new Date(newRawDate);
        const formattedDate = d.getDate().toString().padStart(2, '0') + '.' + (d.getMonth() + 1).toString().padStart(2, '0');
        const sortKey = (d.getMonth() + 1).toString().padStart(2, '0') + d.getDate().toString().padStart(2, '0');

        db.ref('students').once('value', snap => {
            const data = snap.val(); let updates = {};
            for (let sid in data) {
                if (data[sid][currentEdit.sub] && data[sid][currentEdit.sub][currentEdit.cat]) {
                    for (let tid in data[sid][currentEdit.sub][currentEdit.cat]) {
                        if (data[sid][currentEdit.sub][currentEdit.cat][tid].val === currentEdit.oldTask) {
                            updates[`students/${sid}/${currentEdit.sub}/${currentEdit.cat}/${tid}/val`] = newTask;
                            updates[`students/${sid}/${currentEdit.sub}/${currentEdit.cat}/${tid}/date`] = formattedDate;
                            updates[`students/${sid}/${currentEdit.sub}/${currentEdit.cat}/${tid}/sortDate`] = sortKey;
                            updates[`students/${sid}/${currentEdit.sub}/${currentEdit.cat}/${tid}/fullDate`] = newRawDate;
                        }
                    }
                }
            }
            db.ref().update(updates).then(() => { closeModal(); alert("Оновлено!"); });
        });
    }

    function delOne(sid, sub, cat, tid) { if (confirm("Видалити борг?")) db.ref(`students/${sid}/${sub}/${cat}/${tid}`).remove(); }

    function loadData(id) {
        document.getElementById('sNameTitle').innerText = students[id].name;
        db.ref('students/' + id).on('value', snap => {
            const data = snap.val() || {}, area = document.getElementById('debtListArea'); area.innerHTML = "";
            for (let sub in structure) {
                let debts = [];
                structure[sub].forEach(cat => {
                    if (data[sub] && data[sub][cat]) {
                        for (let k in data[sub][cat]) debts.push({ ...data[sub][cat][k], cat });
                    }
                });
                debts.sort((a, b) => (a.sortDate || "9999") - (b.sortDate || "9999"));
                if (debts.length > 0) {
                    let div = `<div class="subject-group"><h4>${sub}</h4>`;
                    debts.forEach(d => {
                        div += `<div class="debt-row"><div class="date-btn">${d.date}</div><div style="display:flex; flex-direction:column; gap:2px;"><span class="cat-badge">${d.cat}</span><b class="task-name">${d.val}</b></div></div>`;
                    });
                    area.innerHTML += div + `</div>`;
                }
            }
            if (!area.innerHTML) area.innerHTML = "<p style='text-align:center;'>✅ Боргів немає!</p>";
        });
    }
</script>
</body>
</html>
