<style>
    /* Додаємо стиль для лічильника */
    .plan-badge {
        background: #61309e;
        color: white;
        padding: 5px 12px;
        border-radius: 15px;
        font-size: 14px;
        margin-bottom: 10px;
        display: inline-block;
    }
    .progress-text {
        font-size: 13px;
        color: #666;
        margin-bottom: 10px;
        display: block;
    }
</style>

<div id="view1">
    <div class="subject-plan" style="margin-bottom: 15px; background: #fff; padding: 10px; border-radius: 12px; border: 1px solid #e9dcf5;">
        <label style="font-size: 13px; color: #61309e;">📊 Вкажіть загальну кількість робіт за період:</label>
        <input type="number" id="planInp" placeholder="Наприклад: 15" style="margin-top: 5px;" onchange="savePlan()">
    </div>
    </div>

<script>
    // Функція для збереження плану в Firebase
    function savePlan() {
        const sub = document.getElementById('subSel').value.split('|')[0];
        const count = document.getElementById('planInp').value;
        if (sub && count) {
            db.ref(`plans/${sub}`).set(count);
        }
    }

    // Оновлена функція loadData для батьків (показує лічильник)
    function loadData(id) {
        document.getElementById('sNameTitle').innerText = students[id].name;
        
        // Отримуємо плани робіт
        db.ref('plans').once('value', planSnap => {
            const plans = planSnap.val() || {};
            
            db.ref('students/' + id).on('value', snap => {
                const data = snap.val() || {};
                const area = document.getElementById('debtListArea'); 
                area.innerHTML = "";

                for (let sub in structure) {
                    let debts = [];
                    structure[sub].forEach(cat => {
                        if (data[sub] && data[sub][cat]) {
                            for (let k in data[sub][cat]) debts.push({ ...data[sub][cat][k], cat });
                        }
                    });

                    const totalPlan = plans[sub] || 0;
                    const doneCount = totalPlan - debts.length;

                    let div = `<div class="subject-group">
                        <h4>${sub}</h4>
                        <span class="plan-badge">Виконано: ${doneCount < 0 ? 0 : doneCount} з ${totalPlan}</span>`;
                    
                    if (debts.length > 0) {
                        debts.sort((a, b) => b.sortDate.localeCompare(a.sortDate)).forEach(d => {
                            const cls = d.cat.includes('Діагностична') ? 'c-diag' : d.cat.includes('Творча') ? 'c-creat' : d.cat.includes('Вірш') ? 'c-poem' : 'c-other';
                            div += `<div class="debt-row"><div class="date-bubble">${d.date}</div><div><span class="cat-tag ${cls}">${d.cat}</span><br><b>${d.val}</b></div></div>`;
                        });
                    }
                    area.innerHTML += div + `</div>`;
                }
            });
        });
    }
</script>
