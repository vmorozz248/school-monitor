<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Шкільний монітор</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f0f9 url('https://raw.githubusercontent.com/vmorozz248/school-monitor/main/background.jpg') no-repeat center center fixed; background-size: cover; margin: 0; padding: 10px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: rgba(255, 255, 255, 0.98); padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); width: 100%; max-width: 500px; box-sizing: border-box; }
        .admin-panel { background: #fdfaff; border: 2px solid #61309e; padding: 15px; border-radius: 15px; margin-bottom: 20px; }
        
        /* ЗАЛІЗНА СІТКА УЧНІВ */
        .student-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 10px; 
            background: white; 
            border: 1px solid #ddd; 
            border-radius: 12px; 
            padding: 12px; 
            margin-bottom: 10px; 
            max-height: 200px; 
            overflow-y: auto; 
        }
        .student-grid label { display: flex; align-items: center; gap: 8px; font-size: 14px; color: #4b1681; cursor: pointer; }
        .student-grid input { width: 18px; height: 18px; flex-shrink: 0; }

        .tab-menu { display: flex; gap: 10px; margin-bottom: 15px; border-bottom: 2px solid #e9dcf5; }
        .tab { padding: 10px; cursor: pointer; font-weight: bold; color: #8352b2; font-size: 14px; }
        .tab.active { color: #61309e; border-bottom: 3px solid #61309e; }
        
        .journal-card { background: white; border: 1px solid #e9dcf5; padding: 12px; border-radius: 12px; margin-bottom: 10px; }
        .journal-header { font-weight: bold; color: #61309e; font-size: 14px; cursor: pointer; display: block; border-bottom: 1px solid #eee; padding-bottom: 5px; margin-bottom: 8px; }
        .debtor-tag { display: inline-block; background: #f3ebf9; color: #61309e; padding: 3px 8px; border-radius: 10px; margin: 2px; cursor: pointer; font-size: 11px; font-weight: bold; }

        .subject-group { background: #fdfaff; border: 1px solid #e9dcf5; padding: 12px; border-radius: 15px; margin-top: 15px; }
        .subject-group h4 { color: #61309e; margin: 0 0 10px 0; border-bottom: 2px solid #e9dcf5; padding-bottom: 5px; }
        .debt-row { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 10px; background: white; padding: 10px; border-radius: 12px; border: 1px solid #f3ebf9; }
        .date-bubble { background: #61309e; color: white; padding: 4px 8px; border-radius: 8px; font-size: 11px; font-weight: bold; min-width: 45px; text-align: center; flex-shrink: 0; box-shadow: 0 2px 0 #3e1d66; }
        .cat-badge { font-size: 10px; font-weight: bold; text-transform: uppercase; color: #8352b2; margin-bottom: 2px; display: block; }

        h1 { color: #1a012b; text-align: center; font-size: 24px; margin: 0 0 10px 0; }
        select, input { width: 100%; padding: 12px; border: 2px solid #e9dcf5; border-radius: 10px; margin-bottom: 10px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; background: #61309e; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .hidden { display: none !important; }
        #counter { font-size: 13px; color: #61309e; font-weight: bold; margin-bottom: 5px; display: block; }
    </style>
</head>
<body>

<div class="card">
    <h1>Шкільний монітор</h1>
    <div id="adminPanel" class="admin-panel hidden">
        <div class="tab-menu">
            <div id="tab1" class="tab active" onclick="showTab(1)">➕ Додати</div>
            <div id="tab2" class="tab" onclick="showTab(2)">📓 Журнал</div>
        </div>
        <div id="view1">
            <span id="counter">Обрано: 0</span>
            <div class="student-grid" id="chkArea"></div>
            <div style="display:flex; gap:10px; margin-bottom:10px;">
                <button style="padding:5px; font-size:11px;" onclick="selectAll(true)">Усі</button>
                <button style="padding:5px; font-size:11px;" onclick="selectAll(false)">Скинути</button>
            </div>
            <select id="subSel"><option value="">-- Предмет --</option></select>
            <input type="date" id="dateInp">
            <input type="text" id="taskInp" placeholder="Назва роботи" onkeypress="if(event.key==='Enter') sendDebt()">
            <button onclick="sendDebt()">Розіслати борг</button>
        </div>
        <div id="view2" class="hidden"><div id="journalArea">Завантаження...</div></div>
    </div>
    <div id="loginForm">
        <select id="uSel"><option value="">-- Учень --</option></select>
        <input type="text" id="pInp" placeholder="Код" onkeypress="if(event.key==='Enter') login()">
        <button onclick="login()">Увійти</button>
    </div>
    <div id="resultView" class="hidden">
        <button onclick="location.reload()" style="width:auto; padding:5px 15px; margin-bottom:10px; font-size:12px;">⬅ Назад</button>
        <h3 id="sNameTitle" style="text-align:center; color:#4b1681;"></h3>
        <div id="debtListArea"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCaf5Zwl4mIxdReLgdoUCkzi1KWEMzeEpA",
        authDomain: "schoolmonitor-b1c8b.firebaseapp.com",
        databaseURL: "https://schoolmonitor-b1c8b-default-rtdb.firebaseio.com/",
        projectId: "schoolmonitor-b1c8b",
        storageBucket: "schoolmonitor-b1c8b.firebasestorage.app",
        messagingSenderId: "838073337449",
        appId: "1:838073337449:web:33a254365be4761b0544f8"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    document.getElementById('dateInp').valueAsDate = new Date();

    const students = {
        "id1": { name: "Астахова Є.", code: "26.12" }, "id2": { name: "Бабенко П.", code: "01.04" },
        "id3": { name: "Водолазька С.", code: "13.02" }, "id4": { name: "Гомонюк С.", code: "15.02" },
        "id5": { name: "Деміденко А.", code: "01.10" }, "id6": { name: "Єлісеєв Д.", code: "11.12" },
        "id7": { name: "Іванець Т.", code: "05.07" }, "id8": { name: "Калантаєва А.", code: "12.02" },
        "id9": { name: "Лисих Л.", code: "31.01" }, "id10": { name: "Оковитий М.", code: "17.06" },
        "id11": { name: "Павлов Т.", code: "26.04" }, "id12": { name: "Радченко В.", code: "25.04" },
        "id13": { name: "Скабардіна М.", code: "15.01" }, "id14": { name: "Удовіка М.", code: "27.10" },
        "id15": { name: "Філатова У.", code: "24.06" }, "id16": { name: "Холматова В.", code: "04.03" },
        "id17": { name: "Шаповал Т.", code: "04.05" }
    };
    const structure = {
        "Літературне читання": ["Діагностична робота", "Вірш", "Творча робота"],
        "Українська мова": ["Діагностична робота", "Інше"],
        "Математика": ["Діагностична робота", "Самостійна робота"],
        "Я досліджую світ": ["Діагностична робота", "Інше"],
        "Дизайн і технології": ["Творча робота"]
    };

    const chkArea = document.getElementById('chkArea');
    Object.keys(students).forEach(id => {
        chkArea.innerHTML += `<label><input type="checkbox" value="${id}" onchange="updateCounter()"> ${students[id].name.split(' ')[0]}</label>`;
        document.getElementById('uSel').innerHTML += `<option value="${id}">${students[id].name}</option>`;
    });
    for (let s in structure) structure[s].forEach(c => document.getElementById('subSel').innerHTML += `<option value="${s}|${c}">${s} - ${c}</option>`);

    function updateCounter() { document.getElementById('counter').innerText = "Обрано: " + document.querySelectorAll('#chkArea input:checked').length; }
    function showTab(n) {
        document.getElementById('view1').classList.toggle('hidden', n !== 1);
        document.getElementById('view2').classList.toggle('hidden', n !== 2);
        document.getElementById('tab1').classList.toggle('active', n === 1);
        document.getElementById('tab2').classList.toggle('active', n === 2);
        if (n === 2) loadJournal();
    }
    function selectAll(v) { document.querySelectorAll('#chkArea input').forEach(c => c.checked = v); updateCounter(); }

    function login() {
        const id = document.getElementById('uSel').value, code = document.getElementById('pInp').value.trim();
        if (code === "21.08") {
            if (id) { document.getElementById('loginForm').classList.add('hidden'); document.getElementById('resultView').classList.remove('hidden'); loadData(id); }
            else { document.getElementById('loginForm').classList.add('hidden'); document.getElementById('adminPanel').classList.remove('hidden'); }
        } else if (id && students[id].code === code) {
            document.getElementById('loginForm').classList.add('hidden'); document.getElementById('resultView').classList.remove('hidden'); loadData(id);
        } else alert("Помилка!");
    }

    function sendDebt() {
        const sel = Array.from(document.querySelectorAll('#chkArea input:checked')).map(c => c.value);
        const sub = document.getElementById('subSel').value.split('|'), task = document.getElementById('taskInp').value.trim(), raw = document.getElementById('dateInp').value;
        if (!task || sel.length === 0 || !sub[0] || !raw) return alert("Заповніть усе!");
        const d = new Date(raw);
        const fDate = d.getDate().toString().padStart(2, '0') + '.' + (d.getMonth() + 1).toString().padStart(2, '0');
        const sKey = (d.getMonth() + 1).toString().padStart(2, '0') + d.getDate().toString().padStart(2, '0');
        sel.forEach(sid => {
            const k = db.ref().child('students').push().key;
            db.ref(`students/${sid}/${sub[0]}/${sub[1]}/${k}`).set({ date: fDate, val: task, sortDate: sKey });
        });
        alert("Розіслано!"); selectAll(false); document.getElementById('taskInp').value = "";
    }

    function loadJournal() {
        db.ref('students').on('value', snap => {
            const data = snap.val() || {}, area = document.getElementById('journalArea');
            area.innerHTML = ""; let sum = {};
            for (let sid in data) {
                for (let sub in data[sid]) {
                    if (sub === "config") continue;
                    for (let cat in data[sid][sub]) {
                        for (let tid in data[sid][sub][cat]) {
                            const t = data[sid][sub][cat][tid];
                            const key = `${sub}|${cat}|${t.val}|${t.date}`;
                            if (!sum[key]) sum[key] = { sub, cat, task: t.val, date: t.date, students: [] };
                            sum[key].students.push({sid, tid});
                        }
                    }
                }
            }
            Object.values(sum).reverse().forEach(item => {
                area.innerHTML += `<div class="journal-card">
                    <span class="journal-header" onclick="quickEdit('${item.sub}','${item.cat}','${item.task}')">✏️ ${item.date} - ${item.sub}: ${item.task}</span>
                    ${item.students.map(st => `<span class="debtor-tag" onclick="delOne('${st.sid}','${item.sub}','${item.cat}','${st.tid}')">${students[st.sid].name.split(' ')[0]}</span>`).join('')}
                </div>`;
            });
        });
    }

    function quickEdit(sub, cat, oldTask) {
        const newTask = prompt("Нова назва роботи:", oldTask);
        if (newTask && newTask !== oldTask) {
            db.ref('students').once('value', snap => {
                const data = snap.val();
                let updates = {};
                for (let sid in data) {
                    if (data[sid][sub] && data[sid][sub][cat]) {
                        for (let tid in data[sid][sub][cat]) {
                            if (data[sid][sub][cat][tid].val === oldTask) {
                                updates[`students/${sid}/${sub}/${cat}/${tid}/val`] = newTask;
                            }
                        }
                    }
                }
                db.ref().update(updates).then(() => alert("Оновлено!"));
            });
        }
    }

    function delOne(sid, sub, cat, tid) { if (confirm("Видалити борг?")) db.ref(`students/${sid}/${sub}/${cat}/${tid}`).remove(); }

    function loadData(id) {
        document.getElementById('sNameTitle').innerText = students[id].name;
        db.ref('students/' + id).on('value', snap => {
            const data = snap.val() || {}, area = document.getElementById('debtListArea'); area.innerHTML = "";
            for (let sub in structure) {
                let debts = [];
                structure[sub].forEach(cat => {
                    if (data[sub] && data[sub][cat]) {
                        for (let k in data[sub][cat]) debts.push({ ...data[sub][cat][k], cat });
                    }
                });
                // СОРТУВАННЯ ЗА ДАТОЮ
                debts.sort((a, b) => (a.sortDate || "9999") - (b.sortDate || "9999"));
                if (debts.length > 0) {
                    let div = `<div class="subject-group"><h4>${sub}</h4>`;
                    debts.forEach(d => {
                        div += `<div class="debt-row">
                            <div class="date-bubble">${d.date}</div>
                            <div>
                                <span class="cat-badge">${d.cat}</span>
                                <b class="task-name">${d.val}</b>
                            </div>
                        </div>`;
                    });
                    area.innerHTML += div + `</div>`;
                }
            }
            if (!area.innerHTML) area.innerHTML = "<p style='text-align:center;'>✅ Боргів немає!</p>";
        });
    }
</script>
</body>
</html>
