<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Шкільний монітор</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5 url('https://raw.githubusercontent.com/vmorozz248/school-monitor/main/background.jpg') no-repeat center center fixed; background-size: cover; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 10px; }
        .card { background: rgba(255, 255, 255, 0.98); padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); width: 100%; max-width: 500px; box-sizing: border-box; }
        .admin-panel { background: #fdfaff; border: 2px solid #61309e; padding: 15px; border-radius: 15px; margin-bottom: 20px; }
        .student-selector { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; background: white; padding: 10px; border: 1px solid #ddd; border-radius: 10px; max-height: 160px; overflow-y: auto; margin-bottom: 10px; }
        .student-selector label { display: flex; align-items: center; gap: 5px; font-size: 13px; cursor: pointer; color: #4b1681; white-space: nowrap; overflow: hidden; }
        .student-selector input { width: 16px; height: 16px; flex-shrink: 0; }
        .quick-access { display: flex; flex-wrap: wrap; gap: 5px; margin: 10px 0; }
        .quick-btn { background: #e9dcf5; border: 1px solid #61309e; padding: 5px 8px; border-radius: 10px; font-size: 11px; cursor: pointer; font-weight: bold; }
        h1 { color: #1a012b; text-align: center; font-size: 24px; margin: 0 0 15px 0; }
        select, input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; margin-bottom: 10px; font-size: 15px; }
        button { width: 100%; padding: 12px; background: #61309e; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .report-box { background: white; border: 1px solid #ddd; padding: 10px; border-radius: 8px; margin-top: 10px; font-size: 13px; max-height: 200px; overflow-y: auto; }
        .subject-group { border: 1px solid #eee; padding: 10px; margin-top: 10px; border-radius: 10px; background: #fff; }
        .multi-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; font-size: 14px; }
        .date-cell { background: #8352b2; color: white; padding: 2px 6px; border-radius: 4px; font-size: 11px; font-weight: bold; }
        .status-debt { color: #c0392b; font-weight: bold; flex-grow: 1; border-bottom: 1px dotted #ccc; cursor: pointer; }
        .hidden { display: none; }
    </style>
</head>
<body>
<div class="card">
    <h1>Шкільний монітор</h1>
    <div id="adminPanel" class="admin-panel hidden">
        <div id="cnt" style="font-size:11px; color:#61309e; font-weight:bold;">Обрано: 0</div>
        <div class="student-selector" id="chkBox"></div>
        <div style="display:flex; gap:5px; margin-bottom:10px;">
            <button style="padding:5px; font-size:11px;" onclick="tgl(true)">Усі</button>
            <button style="padding:5px; font-size:11px;" onclick="tgl(false)">Скинути</button>
        </div>
        <div class="quick-access">
            <div class="quick-btn" onclick="sq('Математика|Самостійна робота')">Мат СР</div>
            <div class="quick-btn" onclick="sq('Українська мова|Діагностична робота')">Укр ДР</div>
            <div class="quick-btn" onclick="sq('Літературне читання|Вірш')">Вірш</div>
        </div>
        <select id="mSub"><option value="">-- Предмет --</option></select>
        <input type="text" id="mTask" placeholder="Назва роботи">
        <button onclick="addW()">Додати обраним</button>
        <button onclick="rep()" style="background:#27ae60; margin-top:10px; font-size:13px; padding:8px;">📊 Звіт по боргах</button>
        <div id="rArea" class="report-box hidden"></div>
    </div>
    <div id="lgn">
        <select id="sSel"><option value="">-- Оберіть учня --</option></select>
        <input type="text" id="pCod" placeholder="Введіть код" onkeypress="if(event.key==='Enter') chk()">
        <button onclick="chk()">Увійти</button>
    </div>
    <div id="res" class="hidden">
        <button onclick="location.reload()" style="width:auto; padding:5px 10px; font-size:12px;">⬅ Назад</button>
        <h3 id="sName" style="text-align:center; color:#4b1681; font-size:18px;"></h3>
        <div id="dList"></div>
    </div>
</div>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCaf5Zwl4mIxdReLgdoUCkzi1KWEMzeEpA",
        authDomain: "schoolmonitor-b1c8b.firebaseapp.com",
        databaseURL: "https://schoolmonitor-b1c8b-default-rtdb.firebaseio.com/",
        projectId: "schoolmonitor-b1c8b",
        storageBucket: "schoolmonitor-b1c8b.firebasestorage.app",
        messagingSenderId: "838073337449",
        appId: "1:838073337449:web:33a254365be4761b0544f8"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const sts = {
        "id1": { code: "26.12", name: "Астахова Євгенія" }, "id2": { code: "01.04", name: "Бабенко Поліна" },
        "id3": { code: "13.02", name: "Водолазька Соломія" }, "id4": { code: "15.02", name: "Гомонюк Софія" },
        "id5": { code: "01.10", name: "Деміденко Аріна" }, "id6": { code: "11.12", name: "Єлісеєв Дмитро" },
        "id7": { code: "05.07", name: "Іванець Тімур" }, "id8": { code: "12.02", name: "Калантаєва Анастасія" },
        "id9": { code: "31.01", name: "Лисих Ліана" }, "id10": { code: "17.06", name: "Оковитий Максим" },
        "id11": { code: "26.04", name: "Павлов Тимур" }, "id12": { code: "25.04", name: "Радченко Владислава" },
        "id13": { code: "15.01", name: "Скабардіна Мілослава" }, "id14": { code: "27.10", name: "Удовіка Макар" },
        "id15": { code: "24.06", name: "Філатова Ульяна" }, "id16": { code: "04.03", name: "Холматова Віолетта" },
        "id17": { code: "04.05", name: "Шаповал Тимур" }
    };
    const str = {
        "Літературне читання": ["Діагностична робота", "Вірш", "Творча робота"],
        "Українська мова": ["Діагностична робота", "Свій вид діяльності"],
        "Математика": ["Діагностична робота", "Самостійна робота"],
        "Я досліджую світ": ["Діагностична робота", "Свій вид діяльності"],
        "Дизайн і технології": ["Творча робота"]
    };

    for (let id in sts) {
        document.getElementById('sSel').innerHTML += `<option value="${id}">${sts[id].name}</option>`;
        document.getElementById('chkBox').innerHTML += `<label><input type="checkbox" value="${id}" onchange="upd()"> ${sts[id].name.split(' ')[0]}</label>`;
    }
    for (let s in str) str[s].forEach(c => document.getElementById('mSub').innerHTML += `<option value="${s}|${c}">${s} - ${c}</option>`);

    function upd() { document.getElementById('cnt').innerText = "Обрано: " + document.querySelectorAll('#chkBox input:checked').length; }
    function sq(v) { document.getElementById('mSub').value = v; }
    function tgl(v) { document.querySelectorAll('#chkBox input').forEach(c => c.checked = v); upd(); }
    
    function chk() {
        const id = document.getElementById('sSel').value;
        const code = document.getElementById('pCod').value.trim();
        if (code === "21.08") {
            document.getElementById('lgn').classList.add('hidden');
            document.getElementById('adminPanel').classList.remove('hidden');
            if (id) { document.getElementById('res').classList.remove('hidden'); load(id, true); }
        } else if (id && sts[id].code === code) {
            document.getElementById('lgn').classList.add('hidden');
            document.getElementById('res').classList.remove('hidden');
            load(id, false);
        } else alert("Помилка!");
    }

    function addW() {
        const sel = Array.from(document.querySelectorAll('#chkBox input:checked')).map(c => c.value);
        const subVal = document.getElementById('mSub').value;
        const task = document.getElementById('mTask').value.trim();
        if (!subVal || !task || sel.length === 0) { alert("Заповніть усе!"); return; }
        const s = subVal.split('|');
        const d = new Date().toLocaleDateString('uk-UA').slice(0, 5);
        sel.forEach(sid => {
            const k = db.ref().child('students').push().key;
            db.ref(`students/${sid}/${s[0]}/${s[1]}/${k}`).set({date: d, val: task});
        });
        alert("Готово!"); tgl(false); document.getElementById('mTask').value = "";
    }

    async function rep() {
        const a = document.getElementById('rArea'); a.classList.remove('hidden'); a.innerHTML = "⏳...";
        const snap = await db.ref('students').once('value');
        const data = snap.val() || {};
        let h = "";
        for (let s in str) {
            str[s].forEach(c => {
                let dbs = {};
                for (let sid in sts) {
                    const d = (data[sid] && data[sid][s] && data[sid][s][c]) ? data[sid][s][c] : {};
                    for (let k in d) if (d[k].val) {
                        if (!dbs[d[k].val]) dbs[d[k].val] = [];
                        dbs[d[k].val].push(sts[sid].name.split(' ')[0]);
                    }
                }
                for (let t in dbs) h += `● ${s} (${t}): <span style="color:red">${dbs[t].join(', ')}</span><br>`;
            });
        }
        a.innerHTML = h || "✅ Боргів немає";
    }

    function load(id, edit) {
        document.getElementById('sName').innerText = sts[id].name;
        db.ref('students/' + id).on('value', snap => {
            const data = snap.val() || {};
            const list = document.getElementById('dList'); list.innerHTML = "";
            for (let s in str) {
                let div = document.createElement('div'); div.className = 'subject-group';
                div.innerHTML = `<h4 style="margin:0; color:#61309e;">${s}</h4>`;
                str[s].forEach(c => {
                    const items = (data[s] && data[s][c]) ? data[s][c] : {};
                    for (let k in items) {
                        if (!edit && !items[k].val) continue;
                        let row = document.createElement('div'); row.className = 'multi-row';
                        row.innerHTML = `<span class="date-cell">${items[k].date}</span>
                                         <span class="${edit?'status-debt':''}" onclick="${edit?`ed('${id}','${s}','${c}','${k}','${items[k].val}')`:''}">${items[k].val || 'немає ✅'}</span>`;
                        if(edit) {
                            let b = document.createElement('button'); b.innerText = "×"; b.style.width="25px"; b.style.padding="2px"; b.style.background="none"; b.style.color="red"; b.style.border="none";
                            b.onclick = () => db.ref(`students/${id}/${s}/${c}/${k}`).remove();
                            row.appendChild(b);
                        }
                        div.appendChild(row);
                    }
                });
                list.appendChild(div);
            }
        });
    }

    function ed(sid, s, c, k, cur) {
        let v = prompt("Змінити назву:", cur);
        if (v !== null) db.ref(`students/${sid}/${s}/${c}/${k}/val`).set(v);
    }
</script>
</body>
</html>
